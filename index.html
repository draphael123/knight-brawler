<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Knight Brawler — a forest beat-’em-up</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d0b14; color: #e8e2d0;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    overflow: hidden;
  }
  #wrap { display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; gap: 10px; }
  canvas { background: #100d18; border: 4px solid #b79043; border-radius: 2px; image-rendering: pixelated; box-shadow: 0 0 0 2px #241b2d, 0 18px 70px rgba(0,0,0,0.78); }
  #hud { font-size: 12px; color: #8a829e; letter-spacing: 0.5px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  #hud b { color: #d8b96a; }
  .key { background: #2a2540; border: 1px solid #463f63; border-radius: 4px; padding: 1px 6px; color: #c9c1e0; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="540"></canvas>
  <div id="hud">
    <span><span class="key">A/D</span> <span class="key">W/S</span> move</span>
    <span><span class="key">J</span> light chain</span>
    <span><span class="key">K</span> heavy</span>
    <span><span class="key">J,J,K</span> rising slash</span>
    <span><span class="key">J,J,J,K</span> whirlwind</span>
    <span><span class="key">Space</span> jump → <span class="key">J/K</span> aerial</span>
    <span><span class="key">L</span> shield</span>
    <span><span class="key">Shift</span> dodge</span>
    <span><span class="key">E</span> pick up / throw</span>
    <span><span class="key">R</span> reset</span>
  </div>
</div>
<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// ---- 2.5D world ----
// x = horizontal screen, z = depth (0 = far/top of floor, 1 = near/bottom).
// We map z to a screen y range and scale sprites with depth for the classic
// beat-'em-up "walk into the screen" plane.
const FLOOR_TOP = 300, FLOOR_BOTTOM = 500;
function zToY(z){ return FLOOR_TOP + z * (FLOOR_BOTTOM - FLOOR_TOP); }
function depthScale(z){ return 0.86 + z * 0.48; }   // larger, more readable stage silhouettes

// ---- forest scenery (precomputed so it doesn't flicker) ----
let _seed = 20260630;
function srand(){ _seed = (_seed*1103515245 + 12345) & 0x7fffffff; return _seed/0x7fffffff; }
const farTrees = [], midTrees = [], foreTrees = [], tufts = [], decos = [], fireflies = [], leaves = [], birds = [];

// ---- per-level environment themes (palette + props drive a distinct biome) ----
// indexed by levelIdx; `TH` holds the active one. Set in startLevel before buildScenery.
const THEMES = [
  { // 0 — Greenwood Path: bright sunlit forest
    sky:['#16241a','#28432c','#5d7d54'], floor:['#48623b','#2c4226'], path:'#5b4a34',
    far:'#33502f', canopy:['#2f4a28','#39572f','#274320'], trunk:'#3a2b1f',
    foreCanopy:'#1d3416', foreTrunk:'#2a1f16', treeDensity:1,
    tuft:['#3f5a30','#4a6b38'], leaf:['#7a8a3a','#9a6a32'],
    mote:{c:'#e9ffa6'}, mist:'#bcd0b8', mistA:0.12, shaft:'#f3ffcf', shaftA:0.07,
    silhouette:'castle', treeStyle:'ancient', landmark:'shrine', props:['bush','mushroom','log','campfire','banner'], birds:true, overlay:null },
  { // 1 — Thornwood: dark, foggy, dead woods
    sky:['#0e1414','#1b2620','#33403a'], floor:['#33403a','#1e2823'], path:'#3e3a34',
    far:'#1c2622', canopy:['#26352b','#2b3a30','#1f2d25'], trunk:'#241f1c',
    foreCanopy:'#16231b', foreTrunk:'#1a1714', treeDensity:1.2,
    tuft:['#3a4438','#46503f'], leaf:['#4a5a3a','#6a5a44'],
    mote:{c:'#9fb0a8'}, mist:'#9fb0a8', mistA:0.24, shaft:'#cfe0d0', shaftA:0.04,
    silhouette:'deadtrees', treeStyle:'thorn', landmark:'thornarch', props:['bramble','mushroom','deadtree','bush'], birds:false,
    overlay:{c:'8,16,13', a:0.20} },
  { // 2 — The Old Bridge: river crossing, stone & water
    sky:['#243b4a','#3a5a6a','#86a2a8'], floor:['#5a6b60','#3e4a44'], path:'#6a6258',
    far:'#2e4450', canopy:['#3a5240','#46603f'], trunk:'#3a2f24',
    foreCanopy:'#2a3e26', foreTrunk:'#241d16', treeDensity:0.5,
    tuft:['#5a6b50','#6a7858'], leaf:['#7a8a5a','#88a0a8'],
    mote:{c:'#cfe6f0'}, mist:'#cfe0e8', mistA:0.14, shaft:'#eaf6ff', shaftA:0.05,
    silhouette:'hills', treeStyle:'windswept', landmark:'bridge', props:['reeds','rock','reeds','bush'], birds:true, water:true, overlay:null },
  { // 3 — Ruined Gate: crumbling ruins at dusk
    sky:['#2a1c2a','#6a3a3a','#d88a4a'], floor:['#5a4a42','#352a26'], path:'#6b5a48',
    far:'#3a2630', canopy:['#3a2e22','#332819'], trunk:'#2e241c',
    foreCanopy:'#2a2018', foreTrunk:'#221a14', treeDensity:0.35,
    tuft:['#6a5a44','#7a6a4a'], leaf:['#8a6a44','#a06a3a'],
    mote:{c:'#ffcaa0', rise:true}, mist:'#caa090', mistA:0.13, shaft:'#ffd9a0', shaftA:0.10,
    silhouette:'ruins', treeStyle:'charred', landmark:'gate', props:['rubble','column','banner','rock'], birds:true,
    overlay:{c:'48,22,10', a:0.12} },
  { // 4 — The Keep: torch-lit castle interior (finale)
    sky:['#15111c','#221a28','#2e2536'], floor:['#3a3340','#24202c'], path:'#4a4452',
    far:'#241d2c', canopy:null, trunk:'#2e241c', treeDensity:0,
    tuft:['#3a3442','#46404e'], leaf:['#5a4a52','#6a5a44'],
    mote:{c:'#ffd08a', rise:true}, mist:'#2a2433', mistA:0.10, shaft:'#ffce8a', shaftA:0.06,
    silhouette:'hall', treeStyle:'none', landmark:'throne', props:['column','torch','banner','rubble'], birds:false,
    overlay:{c:'10,6,16', a:0.22} },
];
let TH = THEMES[0];

// Large screen-space compositions give every chapter a recognisable silhouette.
function drawChapterComposition(){
  ctx.save();
  if(levelIdx===0){
    const sun=ctx.createRadialGradient(690,104,8,690,104,145);
    sun.addColorStop(0,'rgba(255,247,177,.95)');sun.addColorStop(.34,'rgba(238,194,91,.55)');sun.addColorStop(1,'rgba(238,194,91,0)');
    ctx.fillStyle=sun;ctx.beginPath();ctx.arc(690,104,145,0,7);ctx.fill();ctx.fillStyle='#1d361f';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,210);ctx.bezierCurveTo(95,150,150,186,235,100);ctx.bezierCurveTo(320,18,388,76,450,0);ctx.fill();
    ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(W,218);ctx.bezierCurveTo(810,142,760,178,704,112);ctx.bezierCurveTo(634,28,590,74,548,0);ctx.fill();
  }else if(levelIdx===1){
    ctx.fillStyle='#d8c7dc';ctx.globalAlpha=.82;ctx.beginPath();ctx.arc(720,82,58,0,7);ctx.fill();
    ctx.fillStyle='#12121a';ctx.globalAlpha=1;ctx.beginPath();ctx.arc(742,70,55,0,7);ctx.fill();
    ctx.strokeStyle='#0d1011';ctx.lineWidth=24;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-20,235);ctx.bezierCurveTo(65,80,180,42,302,-18);ctx.moveTo(920,220);ctx.bezierCurveTo(825,70,710,40,586,-18);ctx.stroke();
  }else if(levelIdx===2){
    ctx.fillStyle='#d6edf0';ctx.globalAlpha=.8;ctx.beginPath();ctx.arc(170,86,62,0,7);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#314955';for(let i=0;i<9;i++){ctx.beginPath();ctx.moveTo(i*130-80,260);ctx.lineTo(i*130+25,92+(i%3)*30);ctx.lineTo(i*130+145,260);ctx.fill();}
    ctx.fillStyle='#58666a';ctx.fillRect(0,220,W,38);ctx.strokeStyle='#8b9999';ctx.lineWidth=16;ctx.beginPath();ctx.moveTo(-30,230);ctx.quadraticCurveTo(210,70,455,230);ctx.quadraticCurveTo(690,72,930,230);ctx.stroke();
  }else if(levelIdx===3){
    const sun=ctx.createRadialGradient(175,115,16,175,115,120);sun.addColorStop(0,'#ffd06d');sun.addColorStop(.45,'rgba(232,92,52,.5)');sun.addColorStop(1,'rgba(80,20,32,0)');
    ctx.fillStyle=sun;ctx.beginPath();ctx.arc(175,115,120,0,7);ctx.fill();ctx.fillStyle='#241c27';ctx.fillRect(570,42,250,218);ctx.fillRect(535,86,320,34);
    ctx.fillStyle=TH.sky[1];ctx.beginPath();ctx.moveTo(628,260);ctx.lineTo(628,154);ctx.arc(695,154,67,Math.PI,0);ctx.lineTo(762,260);ctx.fill();
    ctx.fillStyle='#241c27';for(let i=0;i<7;i++)ctx.fillRect(540+i*48,68-(i%2)*18,30,34);
  }else{
    ctx.fillStyle='#100d17';ctx.fillRect(0,0,W,282);ctx.strokeStyle='#55435f';ctx.lineWidth=22;
    for(let x=40;x<W;x+=205){ctx.beginPath();ctx.moveTo(x,272);ctx.lineTo(x,105);ctx.arc(x+64,105,64,Math.PI,0);ctx.lineTo(x+128,272);ctx.stroke();}
    const rose=ctx.createRadialGradient(450,102,4,450,102,92);rose.addColorStop(0,'rgba(244,91,87,.8)');rose.addColorStop(.5,'rgba(91,61,141,.55)');rose.addColorStop(1,'rgba(30,20,48,0)');
    ctx.fillStyle=rose;ctx.beginPath();ctx.arc(450,102,92,0,7);ctx.fill();ctx.strokeStyle='#d8b96a';ctx.lineWidth=4;ctx.beginPath();ctx.arc(450,102,45,0,7);ctx.moveTo(405,102);ctx.lineTo(495,102);ctx.moveTo(450,57);ctx.lineTo(450,147);ctx.stroke();
  }
  ctx.restore();
}

function drawChapterGround(){
  ctx.save();
  if(levelIdx===0){ctx.strokeStyle='rgba(229,211,132,.22)';ctx.lineWidth=3;for(let x=30;x<worldW;x+=120){ctx.beginPath();ctx.moveTo(x,FLOOR_TOP+38);ctx.quadraticCurveTo(x+45,405,x+95,H);ctx.stroke();}}
  else if(levelIdx===1){ctx.strokeStyle='#171b19';ctx.lineWidth=6;for(let x=35;x<worldW;x+=155){ctx.beginPath();ctx.moveTo(x,H);ctx.quadraticCurveTo(x+70,390,x+16,FLOOR_TOP+24);ctx.stroke();}}
  else if(levelIdx===2){ctx.fillStyle='#686a67';for(let x=-50;x<worldW;x+=92)for(let y=FLOOR_TOP+35;y<H;y+=42)ctx.fillRect(x+((y/42)%2)*46,y,86,34);ctx.strokeStyle='rgba(38,45,47,.55)';ctx.lineWidth=3;for(let y=FLOOR_TOP+35;y<H;y+=42){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(worldW,y);ctx.stroke();}}
  else if(levelIdx===3){ctx.strokeStyle='rgba(255,169,84,.2)';ctx.lineWidth=5;for(let x=50;x<worldW;x+=180){ctx.beginPath();ctx.moveTo(x,H);ctx.lineTo(x+70,390);ctx.lineTo(x+35,FLOOR_TOP+34);ctx.stroke();}}
  else{ctx.strokeStyle='#16111d';ctx.lineWidth=4;for(let x=-120;x<worldW;x+=120){ctx.beginPath();ctx.moveTo(x,H);ctx.lineTo(x+95,FLOOR_TOP+34);ctx.stroke();}}
  ctx.restore();
}
// Build the forest. World-space layers (mid trees, tufts, decos, fireflies,
// fore trees) span the whole level width `ww` so a scrolling camera always has
// scenery; screen-space layers (far trees, leaves, birds) stay sized to the view.
function buildScenery(ww){
  _seed = 20260630;                                   // deterministic per build
  farTrees.length=0; midTrees.length=0; tufts.length=0; decos.length=0;
  fireflies.length=0; leaves.length=0; birds.length=0; foreTrees.length=0;
  const span = ww / W;                                // density multiplier vs one screen
  const T = TH;

  // --- screen-space distant haze (drawn fixed, behind the camera transform) ---
  for (let i=0;i<18;i++) farTrees.push({ x: srand()*W, y: 70+srand()*130, r: 36+srand()*44, c: T.far });
  for (let i=0;i<14;i++){ leaves.push({ x: srand()*W, y: srand()*FLOOR_TOP, vy: 0.3+srand()*0.5, sway: srand()*6.28, sp: 0.5+srand()*1, rot: srand()*6.28, vr: (srand()-0.5)*0.1, sz: 2.5+srand()*2.5, c: T.leaf[srand()<0.5?0:1] }); }
  if (T.birds) for (let i=0;i<3;i++){ birds.push({ x: srand()*W, y: 60+srand()*70, vx: 0.4+srand()*0.5, ph: srand()*6.28 }); }

  // --- trees (skipped for interior themes where canopy is null) ---
  if (T.canopy){
    const nTrees = Math.round(11*span*(T.treeDensity!=null?T.treeDensity:1));
    for (let i=0;i<nTrees;i++){
      midTrees.push({ x: srand()*ww, baseY: FLOOR_TOP+6+srand()*48, h: 110+srand()*80, r: 44+srand()*28,
        canopy: T.canopy[Math.floor(srand()*T.canopy.length)], trunk: T.trunk, style:T.treeStyle, phase:srand()*6.28 });
    }
    midTrees.sort((a,b)=>a.baseY-b.baseY);
    foreTrees.push({ x:-30,    baseY:H+50, h:H*0.95, r:140, trunk:T.foreTrunk, canopy:T.foreCanopy, style:T.treeStyle, phase:1.2 });
    foreTrees.push({ x:ww+30,  baseY:H+30, h:H,      r:150, trunk:T.foreTrunk, canopy:T.foreCanopy, style:T.treeStyle, phase:4.1 });
  }

  // --- ground tufts/cracks ---
  for (let i=0;i<Math.round(46*span);i++){ tufts.push({ x: srand()*ww, z: srand(), grass: srand()<0.78, c: T.tuft[srand()<0.5?0:1] }); }

  // --- props from the theme list (count/size/placement per type) ---
  for (const p of T.props){
    if (p==='campfire'){ decos.push({ type:'campfire', x: 120+srand()*80, z: 0.12, r: 16 }); continue; }
    const laneSafe = (p==='rock'||p==='mushroom'||p==='rubble'||p==='reeds');   // small props can sit anywhere
    let n;
    if (p==='log'||p==='deadtree'||p==='column') n = Math.max(1, Math.round(2.5*span));
    else if (p==='banner'||p==='torch')          n = Math.max(1, Math.round(2*span));
    else                                         n = Math.max(2, Math.round(8*span));
    for (let i=0;i<n;i++){
      const z = laneSafe ? 0.06+srand()*0.9 : (srand()<0.5 ? 0.04+srand()*0.12 : 0.86+srand()*0.12);
      const r = p==='log'?70 : p==='deadtree'?54 : p==='column'?22 : p==='reeds'?18
              : (p==='bush'||p==='bramble')?16+srand()*12 : p==='rubble'?12+srand()*10 : 7+srand()*9;
      decos.push({ type:p, x: srand()*ww, z, r });
    }
  }
  decos.sort((a,b)=>a.z-b.z);

  // --- floating motes (fireflies / spores / embers, themed colour + drift) ---
  for (let i=0;i<Math.round(26*span);i++){
    fireflies.push({ x: srand()*ww, y: 110+srand()*230, ph: srand()*6.28, sp: 0.4+srand()*0.8, amp: 8+srand()*14, c: T.mote.c, rise: T.mote.rise?1:0 });
  }
}
buildScenery(W);                                        // initial build for the menus
function drawTree(t){
  const sway=Math.sin(gameT*0.018+(t.phase||0))*3, top=t.baseY-t.h, trunk=t.trunk||'#3a2b1f';
  ctx.save();
  if(t.style==='thorn'){
    ctx.strokeStyle=trunk;ctx.lineWidth=Math.max(7,t.r*0.15);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(t.x,t.baseY);ctx.quadraticCurveTo(t.x-12,top+t.h*0.5,t.x+sway,top);ctx.stroke();
    ctx.lineWidth=Math.max(3,t.r*0.065);
    for(let i=0;i<5;i++){const side=i%2?-1:1,by=top+18+i*t.h*0.13;
      ctx.beginPath();ctx.moveTo(t.x,by+25);ctx.quadraticCurveTo(t.x+side*t.r*0.45,by,t.x+side*t.r*0.72+sway,by-18);ctx.stroke();}
    ctx.strokeStyle=t.canopy;ctx.lineWidth=3;
    for(let i=0;i<8;i++){const a=i*0.78+(t.phase||0);ctx.beginPath();ctx.moveTo(t.x+sway,top);ctx.lineTo(t.x+Math.cos(a)*t.r*0.85,top+Math.sin(a)*t.r*0.55);ctx.stroke();}
  }else if(t.style==='windswept'){
    ctx.fillStyle=trunk;ctx.beginPath();ctx.moveTo(t.x-10,t.baseY);ctx.quadraticCurveTo(t.x-18,top+t.h*0.45,t.x+sway-3,top);
    ctx.lineTo(t.x+sway+9,top);ctx.quadraticCurveTo(t.x+2,top+t.h*0.5,t.x+10,t.baseY);ctx.fill();
    ctx.fillStyle=t.canopy;
    for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(t.x-18+i*18+sway,top-8-i*4,t.r*(0.62-i*0.06),t.r*0.28,-0.12,0,7);ctx.fill();}
  }else if(t.style==='charred'){
    ctx.strokeStyle=trunk;ctx.lineWidth=12;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(t.x,t.baseY);ctx.lineTo(t.x+sway*0.3,top);ctx.stroke();
    ctx.lineWidth=5;for(let i=0;i<4;i++){const side=i%2?-1:1,yy=top+20+i*22;ctx.beginPath();ctx.moveTo(t.x,yy);ctx.lineTo(t.x+side*(28+i*5)+sway,yy-30);ctx.stroke();}
    ctx.fillStyle=t.canopy;ctx.globalAlpha=0.55;ctx.beginPath();ctx.ellipse(t.x+sway,top-8,t.r*0.6,t.r*0.25,0,0,7);ctx.fill();ctx.globalAlpha=1;
  }else{
    ctx.fillStyle=trunk;ctx.beginPath();ctx.moveTo(t.x-11,t.baseY);ctx.quadraticCurveTo(t.x-18,top+t.h*0.52,t.x+sway-6,top);
    ctx.lineTo(t.x+sway+8,top);ctx.quadraticCurveTo(t.x+20,top+t.h*0.55,t.x+12,t.baseY);ctx.fill();
    ctx.strokeStyle=trunk;ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(t.x+sway,top+24);ctx.lineTo(t.x-t.r*0.55+sway,top-4);ctx.moveTo(t.x+sway,top+18);ctx.lineTo(t.x+t.r*0.58+sway,top-12);ctx.stroke();
    ctx.fillStyle=t.canopy;ctx.beginPath();ctx.arc(t.x+sway,top,t.r,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(t.x-t.r*0.66+sway,top+12,t.r*0.7,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(t.x+t.r*0.66+sway,top+8,t.r*0.72,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(t.x+sway,top-t.r*0.5,t.r*0.78,0,7);ctx.fill();
  }
  ctx.restore();
}
function drawDeco(d){
  const y = zToY(d.z), s = depthScale(d.z);
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(d.x, y, d.r*s*0.9, d.r*s*0.3, 0, 0, 7); ctx.fill();
  if (d.type==='bush'){
    const sway = Math.sin(gameT*0.04 + d.x*0.05)*1.6*s;
    ctx.fillStyle='#33502c';
    ctx.beginPath(); ctx.arc(d.x+sway, y-d.r*s*0.5, d.r*s, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(d.x-d.r*s*0.7+sway, y-d.r*s*0.3, d.r*s*0.7, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(d.x+d.r*s*0.7+sway, y-d.r*s*0.3, d.r*s*0.75, 0, 7); ctx.fill();
    ctx.fillStyle='#3e6135'; ctx.beginPath(); ctx.arc(d.x+d.r*s*0.2+sway, y-d.r*s*0.7, d.r*s*0.5, 0, 7); ctx.fill();
  } else if (d.type==='rock'){
    ctx.fillStyle='#7c7a78'; ctx.beginPath(); ctx.ellipse(d.x, y-d.r*s*0.4, d.r*s, d.r*s*0.7, 0, 0, 7); ctx.fill();
    ctx.fillStyle='#928f8a'; ctx.beginPath(); ctx.ellipse(d.x-d.r*s*0.3, y-d.r*s*0.6, d.r*s*0.45, d.r*s*0.3, 0, 0, 7); ctx.fill();
  } else if (d.type==='mushroom'){
    ctx.fillStyle='#d8cdb4'; ctx.fillRect(d.x-1.5*s, y-d.r*s*1.6, 3*s, d.r*s*1.6);
    ctx.fillStyle='#b5482f'; ctx.beginPath(); ctx.ellipse(d.x, y-d.r*s*1.6, d.r*s, d.r*s*0.7, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle='#e8d9c0'; ctx.beginPath(); ctx.arc(d.x-d.r*s*0.3, y-d.r*s*1.8, 1.2*s, 0, 7); ctx.fill();
  } else if (d.type==='log'){
    ctx.fillStyle='#4a3526'; roundRect(d.x-d.r*s/2, y-12*s, d.r*s, 14*s, 6*s); ctx.fill();
    ctx.fillStyle='#6b4e38'; ctx.beginPath(); ctx.ellipse(d.x-d.r*s/2, y-5*s, 5*s, 7*s, 0, 0, 7); ctx.fill();
    ctx.fillStyle='#7c5c44'; ctx.beginPath(); ctx.arc(d.x-d.r*s/2, y-5*s, 2.5*s, 0, 7); ctx.fill();
  } else if (d.type==='campfire'){
    // glowing pool of light
    const flick = 0.75 + 0.25*Math.sin(gameT*0.3) + 0.1*Math.sin(gameT*0.73);
    const gl = ctx.createRadialGradient(d.x, y-6*s, 2, d.x, y-6*s, 60*s*flick);
    gl.addColorStop(0,'rgba(255,170,70,0.5)'); gl.addColorStop(1,'rgba(255,140,40,0)');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(d.x, y-6*s, 60*s, 0, 7); ctx.fill();
    // logs
    ctx.strokeStyle='#3a2a1c'; ctx.lineWidth=4*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(d.x-10*s,y); ctx.lineTo(d.x+10*s,y-3*s); ctx.moveTo(d.x-10*s,y-3*s); ctx.lineTo(d.x+10*s,y); ctx.stroke();
    // flames
    for (let i=0;i<3;i++){ const fx=d.x+(i-1)*5*s, fh=(16+6*Math.sin(gameT*0.4+i*2))*s*flick;
      ctx.fillStyle = i===1?'#ffd24a':'#ff8a3a'; ctx.beginPath();
      ctx.moveTo(fx-4*s,y-2*s); ctx.quadraticCurveTo(fx,y-fh, fx+4*s,y-2*s); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle='#fff2b0'; ctx.beginPath(); ctx.moveTo(d.x-2*s,y-2*s); ctx.quadraticCurveTo(d.x,y-9*s*flick,d.x+2*s,y-2*s); ctx.fill();
  } else if (d.type==='banner'){
    ctx.strokeStyle='#3a2a1c'; ctx.lineWidth=3*s; ctx.beginPath(); ctx.moveTo(d.x,y); ctx.lineTo(d.x,y-56*s); ctx.stroke();
    const wav = Math.sin(gameT*0.08)*3*s;
    ctx.fillStyle='#7b2f3a'; ctx.beginPath();
    ctx.moveTo(d.x,y-54*s); ctx.lineTo(d.x+22*s+wav,y-50*s); ctx.lineTo(d.x+17*s+wav,y-40*s);
    ctx.lineTo(d.x+23*s+wav,y-30*s); ctx.lineTo(d.x,y-32*s); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#d8b96a'; ctx.beginPath(); ctx.arc(d.x+11*s+wav*0.6, y-42*s, 3*s, 0, 7); ctx.fill();
  } else if (d.type==='bramble'){
    // tangled thorn bush — dark mass with spiky tendrils
    ctx.fillStyle='#202a22'; ctx.beginPath(); ctx.arc(d.x, y-d.r*s*0.4, d.r*s*0.9, 0, 7); ctx.fill();
    ctx.strokeStyle='#2f3a2e'; ctx.lineWidth=2*s;
    for (let i=0;i<6;i++){ const a=-2.6+i*0.45, L=d.r*s*(1+srandLike(d.x+i)*0.4);
      ctx.beginPath(); ctx.moveTo(d.x, y-d.r*s*0.4); ctx.lineTo(d.x+Math.cos(a)*L, y-d.r*s*0.4+Math.sin(a)*L); ctx.stroke(); }
    ctx.fillStyle='#6a2030'; for (let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(d.x+(i-1)*6*s, y-d.r*s*0.7, 2*s, 0, 7); ctx.fill(); } // thorn-berries
  } else if (d.type==='deadtree'){
    // bare dead trunk with a few crooked branches
    ctx.fillStyle='#241f1c'; ctx.fillRect(d.x-5*s, y-d.r*s*1.8, 10*s, d.r*s*1.8);
    ctx.strokeStyle='#241f1c'; ctx.lineWidth=4*s; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(d.x, y-d.r*s*1.2); ctx.lineTo(d.x-d.r*s*0.7, y-d.r*s*1.7);
    ctx.moveTo(d.x, y-d.r*s*1.5); ctx.lineTo(d.x+d.r*s*0.8, y-d.r*s*1.9);
    ctx.moveTo(d.x, y-d.r*s*1.7); ctx.lineTo(d.x-d.r*s*0.4, y-d.r*s*2.2); ctx.stroke();
  } else if (d.type==='reeds'){
    // riverbank reeds — clustered blades swaying
    const sway = Math.sin(gameT*0.05 + d.x*0.04)*3*s;
    ctx.strokeStyle='#6f8a52'; ctx.lineWidth=2*s; ctx.lineCap='round';
    for (let i=0;i<5;i++){ const bx=d.x+(i-2)*4*s; ctx.beginPath(); ctx.moveTo(bx,y); ctx.quadraticCurveTo(bx+sway*0.5, y-d.r*s*0.9, bx+sway, y-d.r*s*1.6); ctx.stroke(); }
    ctx.fillStyle='#8a6a3a'; for (let i=0;i<2;i++){ ctx.beginPath(); ctx.ellipse(d.x+(i-0.5)*8*s+sway, y-d.r*s*1.5, 2*s, 5*s, 0, 0, 7); ctx.fill(); } // cattail heads
  } else if (d.type==='rubble'){
    // pile of broken masonry blocks
    ctx.fillStyle='#6a6258'; roundRect(d.x-d.r*s*0.7, y-d.r*s*0.6, d.r*s*1.4, d.r*s*0.6, 2*s); ctx.fill();
    ctx.fillStyle='#7c746a'; roundRect(d.x-d.r*s*0.3, y-d.r*s*1.0, d.r*s*0.7, d.r*s*0.5, 2*s); ctx.fill();
    ctx.fillStyle='#574f47'; roundRect(d.x+d.r*s*0.1, y-d.r*s*0.55, d.r*s*0.5, d.r*s*0.45, 2*s); ctx.fill();
  } else if (d.type==='column'){
    // weathered stone column (fluted shaft + capital + base)
    const H2 = d.r*s*4.2, wd = d.r*s*0.9;
    ctx.fillStyle='#574f5a'; ctx.fillRect(d.x-wd*0.7, y-6*s, wd*1.4, 6*s);            // base
    ctx.fillStyle='#6b6470'; ctx.fillRect(d.x-wd/2, y-H2, wd, H2);                    // shaft
    ctx.fillStyle='#7a7280'; ctx.fillRect(d.x-wd/2, y-H2, wd*0.25, H2);              // lit edge
    ctx.fillStyle='#574f5a'; ctx.fillRect(d.x-wd*0.7, y-H2-6*s, wd*1.4, 7*s);         // capital
  } else if (d.type==='torch'){
    // wall sconce torch with a flickering flame + glow pool
    const flick = 0.7 + 0.3*Math.sin(gameT*0.4 + d.x) + 0.1*Math.sin(gameT*0.9);
    const gl = ctx.createRadialGradient(d.x, y-d.r*s*3, 2, d.x, y-d.r*s*3, 70*s*flick);
    gl.addColorStop(0,'rgba(255,180,90,0.45)'); gl.addColorStop(1,'rgba(255,150,60,0)');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(d.x, y-d.r*s*3, 70*s, 0, 7); ctx.fill();
    ctx.strokeStyle='#2a2420'; ctx.lineWidth=3*s; ctx.beginPath(); ctx.moveTo(d.x, y); ctx.lineTo(d.x, y-d.r*s*3); ctx.stroke();
    const fh=(16+6*Math.sin(gameT*0.5))*s*flick;
    ctx.fillStyle='#ff8a3a'; ctx.beginPath(); ctx.moveTo(d.x-4*s,y-d.r*s*3); ctx.quadraticCurveTo(d.x,y-d.r*s*3-fh,d.x+4*s,y-d.r*s*3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffe49a'; ctx.beginPath(); ctx.moveTo(d.x-2*s,y-d.r*s*3); ctx.quadraticCurveTo(d.x,y-d.r*s*3-fh*0.6,d.x+2*s,y-d.r*s*3); ctx.fill();
  }
}
// tiny deterministic jitter for static deco details (no per-frame randomness)
function srandLike(n){ const x=Math.sin(n*12.9898)*43758.5453; return x-Math.floor(x); }

// distant background silhouette per theme (drawn in the slow-parallax layer)
function drawSilhouette(kind){
  const c = TH.far;
  const reach = worldW*0.18 + W + 200;               // cover the parallax scroll range
  ctx.fillStyle = c;
  if (kind==='castle'){
    for (let bx=0; bx<reach; bx+=560){
      ctx.fillStyle=c;
      ctx.fillRect(bx+W*0.40,120,46,150); ctx.fillRect(bx+W*0.52,95,40,175); ctx.fillRect(bx+W*0.585,150,30,120);
      for (let i=0;i<3;i++){ ctx.fillRect(bx+W*0.40+i*16,112,8,8); ctx.fillRect(bx+W*0.52+i*14,87,8,8); }
      ctx.fillStyle=TH.sky[2]; ctx.fillRect(bx+W*0.555,160,10,110);     // broken gap
    }
  } else if (kind==='deadtrees'){
    ctx.strokeStyle=c; ctx.lineCap='round';
    for (let bx=0; bx<reach; bx+=110){ const h=90+srandLike(bx)*80, x=bx+40;
      ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(x,FLOOR_TOP); ctx.lineTo(x,FLOOR_TOP-h);
      ctx.moveTo(x,FLOOR_TOP-h*0.95); ctx.lineTo(x-18,FLOOR_TOP-h-18);
      ctx.moveTo(x,FLOOR_TOP-h*0.7); ctx.lineTo(x+22,FLOOR_TOP-h*0.85); ctx.stroke();
    }
  } else if (kind==='hills'){
    for (let bx=0; bx<reach; bx+=240){ ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(bx+120,FLOOR_TOP+12,170,92,0,Math.PI,0); ctx.fill(); }
    for (let bx=240; bx<reach; bx+=900){ ctx.fillStyle=c;            // a far stone arch
      ctx.fillRect(bx,150,18,120); ctx.fillRect(bx+96,150,18,120); ctx.fillRect(bx-12,150,138,16); }
  } else if (kind==='ruins'){
    for (let bx=0; bx<reach; bx+=500){ ctx.fillStyle=c;
      ctx.fillRect(bx+W*0.40,150,30,120); ctx.fillRect(bx+W*0.50,112,34,158);    // broken pillars
      ctx.fillRect(bx+W*0.37,112,160,18);                                         // cracked lintel
      ctx.fillStyle=TH.sky[2]; ctx.fillRect(bx+W*0.455,150,9,70);                 // gap
    }
  } else if (kind==='hall'){
    ctx.fillStyle=c; ctx.fillRect(-40,-20,reach+80,FLOOR_TOP+40);                 // interior back wall
    for (let bx=40; bx<reach; bx+=190){
      const wg=ctx.createLinearGradient(0,50,0,210); wg.addColorStop(0,'#3a4a6a'); wg.addColorStop(1,'#171f30');
      ctx.fillStyle=wg; ctx.beginPath(); ctx.moveTo(bx,210); ctx.lineTo(bx,82); ctx.arc(bx+20,82,20,Math.PI,0); ctx.lineTo(bx+40,210); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#5a2030'; ctx.fillRect(bx+74,46,24,118);                     // hanging banner
      ctx.fillStyle='#d8b96a'; ctx.beginPath(); ctx.arc(bx+86,92,6,0,7); ctx.fill();
    }
  }
}

const keys = {};
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (!keys[k]) keys['_pressed_'+k] = true; // edge
  keys[k] = true;
  if ([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
  if (k === 'r' && scene==='playing') startLevel(levelIdx);
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
function pressed(k){ if (keys['_pressed_'+k]) { keys['_pressed_'+k] = false; return true; } return false; }

function makeFighter(x, z, isPlayer, type='grunt'){
  if (isPlayer){
    const PAL = { base:'#5f7cb2', lite:'#a8bee8', dark:'#374a70', trim:'#e0c46a', plume:'#5b8fe0' };
    return Object.assign(baseFields(x,z), { isPlayer:true, type:'knight', face:1, hp:100, maxHp:100,
      w:30, h:64, color:'#6aa9d8', pal:PAL, body:'humanoid', weapon:'sword',
      stamina:100, maxStamina:100, shootCD:0 });
  }
  const st = ENEMY_STATS[type] || ENEMY_STATS.grunt;
  const maxhp = Math.round(st.hp * DIFF[SETTINGS.difficulty].hp);
  return Object.assign(baseFields(x,z), {
    isPlayer:false, type, face:-1, hp:maxhp, maxHp:maxhp,
    w:st.w, h:st.h, color:st.color, pal:st.pal,
    body:st.body, weapon:st.weapon||null,
    shield:!!st.shield, ranged:!!st.ranged, fast:!!st.fast, charger:!!st.charger,
    summoner:!!st.summoner, caster:!!st.caster, boss:!!st.boss, big:!!st.big,
    ghost:!!st.ghost, bones:!!st.bones, hood:!!st.hood,
    stamina:st.sta, maxStamina:st.sta, shootCD: st.ranged ? rand(50,140) : 0,
    phase:1, reform:0,                  // boss phase / skeleton reassembly timer
  });
}
// shared mutable runtime fields for every fighter
function baseFields(x,z){
  return { x, z, vx:0, vz:0, vy:0, y:0, state:'idle', stateT:0,
    attackStep:0, comboTimer:0, comboSeq:[], hitstun:0, iframe:0,
    flash:0, atkCD:0, aiTimer:rand(20,70), hasHitThisSwing:false, bladeFlash:0,
    blocking:false, holdBlock:0, staDelay:0, guardBreak:0, aerial:false, atkKind:'',
    holding:null, stunned:0, deathT:0, chain:0 };
}
function rand(a,b){ return a + Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }

let scene='title', score=0, banner=null, levelIdx=0, level=null, waveNum=0, outcomeT=0, introT=0, mapSel=0;
let codexTab='moves', codexPage=0, codexReturn='title', codexPreview=null, codexPreviewType='';
// ---- side-scroll camera + encounter flow ----
let camX=0, worldW=W;                 // camera offset and current level width
let encounterState='walk';            // 'walk' (free traversal) | 'locked' (fighting an encounter)
let gateIdx=0, lockCamX=0, bossActive=false;

function arenaBounds(){               // x-range the fighters are confined to right now
  if (encounterState==='locked') return [lockCamX+26, lockCamX+W-26];
  return [26, worldW-26];
}

// ---- persistence ----
function loadJSON(k,def){ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?def:v; }catch(e){ return def; } }
function saveJSON(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
const SETTINGS = Object.assign({ shakeOn:true, dmgNumbers:true, difficulty:1, soundOn:true, musicOn:true }, loadJSON('kb_settings',{}));
const legacyProgress = loadJSON('kb_progress', 0);
let CAMPAIGN = Object.assign({
  version:2, cleared:typeof legacyProgress==='number'?legacyProgress:0,
  lastLevel:0, bestScores:{}, attempts:0, victories:0, seen:[]
}, loadJSON('kb_campaign',{}));
if (!CAMPAIGN.bestScores || typeof CAMPAIGN.bestScores!=='object') CAMPAIGN.bestScores={};
if (!Array.isArray(CAMPAIGN.seen)) CAMPAIGN.seen=[];
let progress = clamp(Number(CAMPAIGN.cleared)||0, 0, 5); // compatibility alias used by the map
function saveSettings(){ saveJSON('kb_settings', SETTINGS); }
function saveProgress(){
  CAMPAIGN.cleared=progress;
  CAMPAIGN.lastLevel=clamp(Number(CAMPAIGN.lastLevel)||0,0,Math.max(0,LEVELS.length-1));
  saveJSON('kb_campaign', CAMPAIGN);
  saveJSON('kb_progress', progress);                    // keep older builds compatible
}
function resetProgress(){
  progress=0;
  CAMPAIGN={version:2,cleared:0,lastLevel:0,bestScores:{},attempts:0,victories:0,seen:[]};
  saveProgress();
}

// Older saves did not track discoveries; backfill foes from already-cleared levels.
if (!CAMPAIGN.seen.length && progress>0){
  const known=new Set();
  for(let i=0;i<Math.min(progress,LEVELS.length);i++){
    known.add(LEVELS[i].boss);
    for(const gate of LEVELS[i].gates) for(const type of (gate.roster||[])) known.add(type);
  }
  CAMPAIGN.seen=[...known]; saveProgress();
}

function startLevel(idx){
  levelIdx=idx; level=LEVELS[idx]; worldW=level.worldW; waveNum=0; score=0; outcomeT=0;
  CAMPAIGN.lastLevel=idx; CAMPAIGN.attempts=(CAMPAIGN.attempts||0)+1; saveProgress();
  gateIdx=0; encounterState='walk'; bossActive=false; camX=0; lockCamX=0;
  reinforcements=[]; reinforcementT=0;
  TH = THEMES[idx] || THEMES[0];
  player = makeFighter(120, 0.8, true);
  enemies=[]; particles=[]; floatTexts=[]; ghosts=[]; items=[]; rings=[]; projectiles=[];
  buildScenery(worldW);
  scene='playing'; sfx('start');
  showBanner(level.name, 'Advance  →');
}
// the player walked into the next gate: lock the camera and spawn the encounter
function triggerGate(){
  const g = level.gates[gateIdx];
  reinforcements=[]; reinforcementT=0;
  encounterState='locked';
  lockCamX = clamp(player.x - W*0.45, 0, worldW - W);
  if (g.boss){
    bossActive=true;
    enemies.push(makeFighter(lockCamX + W - 90, 0.62, false, level.boss));
    discoverEnemy(level.boss);
    showBanner('MINI-BOSS', level.bossName); sfx('roar');
  } else {
    const cap=levelIdx<2?2:3;
    const opening=g.roster.slice(0,cap);
    reinforcements=g.roster.slice(cap);
    for (const type of opening) spawnEncounterEnemy(type);
    showBanner('ENCOUNTER '+(gateIdx+1)+' / '+level.gates.length, level.name);
  }
  waveNum = gateIdx+1;
  items = items.filter(it=>!it.dead); spawnItems(2);
}
function spawnEncounterEnemy(type){
  enemies.push(makeFighter(lockCamX + rand(W*0.62, W-70), rand(0.42,0.95), false, type));
  discoverEnemy(type);
}
function discoverEnemy(type){
  if (!CAMPAIGN.seen.includes(type)){ CAMPAIGN.seen.push(type); saveProgress(); }
}
function showBanner(txt, sub){ banner = { txt, sub:sub||'', t:105 }; }
function winLevel(){
  scene='victory'; outcomeT=0; sfx('victory');
  CAMPAIGN.victories=(CAMPAIGN.victories||0)+1;
  CAMPAIGN.bestScores[levelIdx]=Math.max(Number(CAMPAIGN.bestScores[levelIdx])||0, score);
  if (levelIdx+1 > progress){ progress = levelIdx+1; saveProgress(); }
  else saveProgress();
}
function spawnItems(n){
  const [lo,hi] = arenaBounds();
  for (let i=0;i<n;i++){
    items.push({ type: Math.random()<0.5?'rock':'pot', x: rand(lo+50, hi-50), z: rand(0.25, 0.95),
      y:0, vy:0, vx:0, rot:0, held:false, thrown:false, dead:false });
  }
}

function startAttack(f, kind){
  f.state='attack'; f.stateT=0; f.hasHitThisSwing=false; f.aerial=false; f.atkKind=kind;
  if (kind==='light') f.atkDef = LIGHT[f.attackStep];
  else if (kind==='heavy') f.atkDef = HEAVY;
  else if (kind==='special') f.atkDef = SPECIAL;
  else if (kind==='rising') f.atkDef = RISING;
  else if (kind==='cleave') f.atkDef = CLEAVE;
  else if (kind==='earthbreaker') f.atkDef = EARTHBREAKER;
  else f.atkDef = ATK[kind] || ATK.enemy;
  if (f.isPlayer) sfx((kind==='heavy'||kind==='special'||kind==='rising')?'swingheavy':'swing');
  else if (f.atkDef.tele) sfx('warn_'+attackTelegraphType(f.atkDef));
}
function fireArrow(f){
  sfx('arrow');
  const fire = (f.type==='archer' && levelIdx>=2 && Math.random() < 0.35) || f.type==='xbow' && false;
  const bolt = f.atkDef && f.atkDef.bolt;
  projectiles.push({ kind: bolt?'bolt':'arrow', x: f.x + f.face*16, z: f.z, y: -42,
    vx: f.face*(bolt?11:fire?9.5:7.5), owner: f, life: 150, dead: false, fire,
    dmg: bolt?12:fire?11:7, knock: bolt?6:3 });
}
// generic projectile launcher for casters/bosses
function fireProjectile(f, kind){
  const spec = {
    fireball:{vx:8,  y:-46, dmg:13, knock:5,  life:150, sound:'arrow'},
    soul:    {vx:7,  y:-50, dmg:11, knock:4,  life:160, sound:'arrow'},
    boulder: {vx:6.5,y:-34, dmg:17, knock:13, life:150, sound:'slam', big:true},

    owner: f, life: spec.life, dead:false, dmg: spec.dmg, knock: spec.knock, big: !!spec.big, rot:0 });
}
// cultist / wraith raise an undead minion beside themselves (capped so it can't snowball)

function startAirAttack(f, kind){
  f.state='attack'; f.stateT=0; f.hasHitThisSwing=false; f.aerial=true;
  f.atkKind = 'air'+kind;
  f.atkDef = kind==='heavy' ? AERIAL_HEAVY : AERIAL;
  if (kind==='heavy') f.vy = Math.max(f.vy, 7);   // commit to a downward dive
}

function tryHit(attacker, def){
  const targets = attacker.isPlayer ? enemies : [player];
  for (const t of targets){
    if (t.hp<=0 && t.state!=='downed') continue;          // downed skeletons can still be finished off
    if (t.iframe>0 && !attacker.isPlayer) continue;
    const dz = Math.abs(t.z - attacker.z);
    const reachableHeight = t.y > -120;                 // can still clip airborne
    let inRange, aligned;
    if (def.aoe){                                       // whirlwind: hits all around
      inRange = Math.abs(t.x - attacker.x) < def.reach;
      aligned = dz < 0.22;
    } else {
      const dx = (t.x - attacker.x) * attacker.face;
      inRange = dx > -8 && dx < def.reach + t.w*0.5;
      aligned = dz < 0.14;                              // must share the plane
    }
    if (inRange && aligned && reachableHeight){
      hitTarget(attacker, t, def);
      attacker.hasHitThisSwing = true;
      if (attacker.isPlayer && !def.aoe) return;        // single-target swings hit one foe
    }
  }
}

function hitTarget(attacker, t, def){
  if (attacker) attacker.bladeFlash = 7;                  // weapon flashes bright on contact
  // shield block — only works against attacks from the front (shield side)
  if (t.blocking && t.state==='block' && (attacker.x - t.x)*t.face > -10){
    addShake(3); freeze(5);
    spawnSpark(t.x, zToY(t.z) - 40, '#cfd8ff', 8);
    spawnRing(t.x, zToY(t.z)-40, '#cfe0ff', 22);
    pushBack(t, attacker.face, def.knock*0.3);
    // blocking costs stamina; a guard-break attack or an emptied bar shatters the guard
    t.stamina -= def.dmg*1.4; t.staDelay = 45;
    if (def.guardbreak || t.stamina <= 0){ t.stamina = Math.max(0,t.stamina); guardBreak(t, attacker); return; }
    floatTexts.push({x:t.x, y:zToY(t.z)-80, t:30, txt:'BLOCK', c:'#9fb4ff'});
    sfx('block');
    return;
  }
  // enemy attacks scale with difficulty
  let dmg = def.dmg * ((attacker && !attacker.isPlayer) ? DIFF[SETTINGS.difficulty].dmg : 1);
  t.hp -= dmg;
  sfx((def.launch || def.guardbreak) ? 'hitheavy' : 'hit');
  t.flash = 6; t.iframe = 6;
  t.hitstun = def.launch ? 40 : 16;
  // knockback along facing
  pushBack(t, attacker.face, def.knock);
  // launch
  if (def.launch){ t.vy = def.launch; t.state='launched'; t.stateT=0; }
  else if (t.state!=='launched' && t.y<= -2){ /* keep airborne juggle */ }
  else if (t.y < -2){ t.vy = Math.min(t.vy, -4); t.state='launched'; } // pop juggle
  else { t.state='hurt'; t.stateT=0; }

  // JUICE: hit-pause + flash scale with the weight of the hit
  const heavy = def.launch || def.dmg>=10;
  freeze(def.launch ? 9 : (def.dmg>=10 ? 7 : 4));
  addShake(def.launch ? 9 : (def.dmg>=10 ? 7 : 3.5));
  spawnSpark(t.x, zToY(t.z) - 38 + t.y, def.launch ? '#ffd36a' : '#ffffff', def.launch?16:10);
  spawnRing(t.x, zToY(t.z)-38+t.y, heavy?'#ffd36a':'#ffffff', heavy?34:22);
  if (heavy) screenFlash = Math.max(screenFlash, 0.18);
  if (SETTINGS.dmgNumbers) floatTexts.push({x:t.x, y:zToY(t.z)-80+t.y, t:28, txt:Math.round(dmg), c: def.launch?'#ffd36a':'#fff'});
  if (t.hp<=0){
    // SKELETON: collapses to a heap and reassembles — unless you finish it while it's down
    if (t.type==='skeleton' && !t.downed){
      t.downed=true; t.reform=110; t.hp=0; t.state='downed'; t.stateT=0; t.vx=0; t.blocking=false;
      addShake(4); spawnRing(t.x, zToY(t.z)-30, '#e8e2d0', 30);
      for (let i=0;i<10;i++) particles.push({x:t.x, y:zToY(t.z)-30, vx:rand(-3,3), vy:rand(-4,-0.5), life:rand(12,22), c:'#d8d2c0', r:rand(2,3.5)});
      floatTexts.push({x:t.x, y:zToY(t.z)-80, t:26, txt:'CLATTER', c:'#e8e2d0'});
      return;
    }
    killFighter(t, attacker);
  }
}
function killFighter(t, attacker){
  t.state='dead'; t.stateT=0; t.deathT=0; t.vy=-6; t.blocking=false;
  if (attacker) pushBack(t, attacker.face, 7);
  freeze(10); addShake(8); screenFlash = Math.max(screenFlash, 0.3);
  spawnRing(t.x, zToY(t.z)-40, '#ff9a9a', 44);
  for (let i=0;i<14;i++) particles.push({x:t.x, y:zToY(t.z)-40, vx:rand(-4,4), vy:rand(-6,-1), life:rand(14,26), c: t.isPlayer?'#9fc0ff':'#e09a9a', r:rand(2,4)});
  floatTexts.push({x:t.x, y:zToY(t.z)-100, t:50, txt: t.isPlayer?'':'SLAIN', c:'#ff7a7a'});
  if (!t.isPlayer){
    if (!t.boss) sfx('slain');
    const pts = t.boss?1000 : t.type==='guard'?220 : t.type==='shield'?200 : t.type==='mage'?170 : (t.type==='archer'||t.type==='xbow'||t.type==='cultist')?150 : t.type==='boar'?120 : 100;
    score += pts;
    floatTexts.push({x:t.x, y:zToY(t.z)-118, t:48, txt:'+'+pts, c:'#ffd36a'});
    if (t.boss){ freeze(18); addShake(12); screenFlash=Math.max(screenFlash,0.6);   // boss death — big payoff
      for (let i=0;i<30;i++) particles.push({x:t.x, y:zToY(t.z)-50, vx:rand(-7,7), vy:rand(-9,-1), life:rand(20,40), c:i%2?'#ffd36a':'#e09a9a', r:rand(2,5)});
      spawnRing(t.x, zToY(t.z)-40, '#ffe39a', 90); sfx('bossdie'); }
  }
}
function pushBack(t, face, amt){ t.vx += face * amt; }

function guardBreak(t, attacker){
  sfx('guardbreak');
  t.blocking=false; t.holdBlock=0; t.state='hurt'; t.stateT=0; t.hitstun=42; t.guardBreak=110; t.flash=8;
  pushBack(t, attacker.face, 5); addShake(7); freeze(8);
  spawnSpark(t.x, zToY(t.z)-40, '#ffd36a', 18);
  spawnRing(t.x, zToY(t.z)-40, '#ffce6a', 40); screenFlash = Math.max(screenFlash, 0.22);
  floatTexts.push({x:t.x, y:zToY(t.z)-92, t:46, txt:'GUARD BREAK', c:'#ffb74d'});
}

function plungeImpact(f){
  addShake(10); freeze(8);
  spawnSpark(f.x, zToY(f.z), '#ffe0a0', 22);
  // shockwave ring
  for (let i=0;i<14;i++){ const a=(i/14)*Math.PI*2; particles.push({x:f.x, y:zToY(f.z), vx:Math.cos(a)*4, vy:Math.sin(a)*1.4, life:18, c:'#d8b96a', r:3}); }
  for (const e of enemies){ if (e.hp<=0) continue;
    if (Math.abs(e.x-f.x) < 70 && Math.abs(e.z-f.z) < 0.2){
      hitTarget(f, e, { dmg:10, knock:6, launch:-6 });
    }
  }
}

// ---- particles ----
function spawnSpark(x,y,c,n){
  for (let i=0;i<n;i++){
    particles.push({x,y, vx:rand(-4,4), vy:rand(-5,2), life:rand(10,22), c, r:rand(1.5,3.5)});
  }
}

// ---- update ----
function update(){
  // global hit-pause
  if (hitstop>0){ hitstop--; return; }

  // ---- PLAYER ----
  const p = player;
  p.blocking = false;
  const grounded = p.y >= 0;
  if (p.state!=='dead'){
    const canGroundAct = grounded && ['idle','walk','block'].includes(p.state);
    if (canGroundAct){
      const moving = {x:0,z:0};
      if (keys['a']) moving.x -= 1;
      if (keys['d']) moving.x += 1;
      if (keys['w']) moving.z -= 1;
      if (keys['s']) moving.z += 1;
      if (moving.x) p.face = moving.x>0?1:-1;
      const spd = 3.0;
      p.vx = moving.x * spd; p.vz = moving.z * 0.018;
      p.state = (moving.x||moving.z) ? 'walk':'idle';

      // grab / throw (E) — pick up a ground item, then hurl it to stun a foe
      if (pressed('e')){
        if (p.holding){
          const it = p.holding; it.held=false; it.thrown=true;
          it.vx = p.face*11; it.vy = -3.5; it.y = -42; p.holding=null;
          addShake(2); sfx('throw'); floatTexts.push({x:p.x, y:zToY(p.z)-100, t:20, txt:'THROW', c:'#ffe066'});
        } else {
          let best=null, bd=1e9;
          for (const it of items){ if (it.held||it.thrown||it.dead) continue;
            const d = Math.abs(it.x-p.x) + Math.abs(it.z-p.z)*160;
            if (d<bd && Math.abs(it.x-p.x)<48 && Math.abs(it.z-p.z)<0.22){ bd=d; best=it; } }
          if (best){ best.held=true; p.holding=best; }
        }
      }

      // shield (hold L) — drains stamina; empty bar = guard break, can't block while broken
      if (keys['l'] && p.guardBreak<=0 && p.stamina>0){
        p.state='block'; p.blocking=true; p.vx=0; p.vz=0;
        p.stamina -= BLOCK_DRAIN; p.staDelay = 30;
        if (p.stamina<=0){ p.stamina=0; guardBreak(p, {x:p.x-p.face*40, face:p.face}); }
      }
      // jump (Space)
      else if (pressed(' ')){ p.vy=-12; p.y=-0.01; p.state='jump'; p.stateT=0; sfx('jump');
        for (let i=0;i<6;i++) particles.push({x:p.x, y:zToY(p.z), vx:rand(-2,2), vy:rand(-1,0.5), life:rand(8,14), c:'#7a6a4a', r:rand(2,3.5)}); }
      // dodge roll (Shift) — costs stamina
      else if (pressed('shift')){
        if (p.stamina>=ROLL_COST){ p.stamina-=ROLL_COST; p.staDelay=40; p.state='dash'; p.stateT=0; p.vx=p.face*9; p.iframe=12; addShake(2); sfx('dodge');
          for (let i=0;i<8;i++) particles.push({x:p.x-p.face*10, y:zToY(p.z), vx:rand(-2,2)-p.face*1.5, vy:rand(-2.5,-0.5), life:rand(10,20), c:'#7a6a4a', r:rand(2,4)}); }
        else floatTexts.push({x:p.x, y:zToY(p.z)-90, t:24, txt:'TIRED', c:'#caa'});
      }
      // attacks + combo recognition
      else if (pressed('j')){
        p.comboSeq = (p.comboTimer>0) ? [...p.comboSeq,'j'] : ['j'];
        p.attackStep = (p.comboTimer>0) ? (p.attackStep+1)%LIGHT.length : 0;
        startAttack(p,'light');
      } else if (pressed('k')){
        p.comboSeq = (p.comboTimer>0) ? [...p.comboSeq,'k'] : ['k'];
        const seq = p.comboSeq.join('');
        if (seq.endsWith('jjjk')){                          // full light chain → whirlwind crowd-clear
          startAttack(p,'special'); p.comboSeq=[];
          floatTexts.push({x:p.x, y:zToY(p.z)-104, t:34, txt:'WHIRLWIND!', c:'#9fe0ff'});
        } else if (seq.endsWith('jjk')){                    // two lights then heavy → rising launcher
          startAttack(p,'rising'); p.comboSeq=[];
          floatTexts.push({x:p.x, y:zToY(p.z)-104, t:30, txt:'RISING SLASH!', c:'#bfe9ff'});
        } else if (seq.endsWith('jk')){                     // light into a forward guard-breaking cut
          startAttack(p,'cleave'); p.comboSeq=[];
          floatTexts.push({x:p.x, y:zToY(p.z)-104, t:30, txt:'LUNGING CLEAVE!', c:'#ffe09a'});
        } else if (seq.endsWith('kk')){                     // deliberate double-heavy area finisher
          startAttack(p,'earthbreaker'); p.comboSeq=[];
          floatTexts.push({x:p.x, y:zToY(p.z)-104, t:34, txt:'EARTHBREAKER!', c:'#ffbd72'});
        } else { p.attackStep=0; startAttack(p,'heavy'); }
      }
    } else if (!grounded && p.state==='jump'){
      // air control + aerial attacks
      let ax=0; if (keys['a']) ax-=1; if (keys['d']) ax+=1;
      if (ax){ p.face = ax>0?1:-1; p.vx = clamp(p.vx + ax*0.6, -5, 5); }
      if (pressed('j')) startAirAttack(p,'light');
      else if (pressed('k')) startAirAttack(p,'heavy');
    }

    // stamina regen (when not actively spending)
    if (p.staDelay>0) p.staDelay--;
    else if (p.stamina<p.maxStamina && p.state!=='block') p.stamina = Math.min(p.maxStamina, p.stamina+STA_REGEN);
    if (p.guardBreak>0) p.guardBreak--;
  }

  updateFighter(p);
  // combo window: keep the sequence alive through the swing + follow-up window
  if (p.comboTimer>0) p.comboTimer--;
  else if (p.state!=='attack'){ p.attackStep=0; p.comboSeq=[]; }
  // dodge afterimages
  if (p.state==='dash' && p.stateT%2===0){ ghosts.push({x:p.x, z:p.z, y:p.y, face:p.face, s:depthScale(p.z), roll:clamp(p.stateT/12,0,1), life:12, color:p.color}); }

  // ---- ENEMIES ----
  let alive = 0;
  for (const e of enemies){
    if (e.hp>0) alive++;
    enemyAI(e);
    updateFighter(e);
  }
  // Keep fights readable: at most 2 early-game or 3 late-game foes are active.
  // Larger rosters enter as reinforcements after the player creates space.
  if (scene==='playing' && encounterState==='locked' && !bossActive && reinforcements.length){
    const cap=levelIdx<2?2:3;
    const active=enemies.filter(e=>e.state!=='dead').length;
    if(active<cap){
      reinforcementT++;
      if(reinforcementT>=38){
        const type=reinforcements.shift(); spawnEncounterEnemy(type); reinforcementT=0;
        floatTexts.push({x:lockCamX+W-105,y:245,t:36,txt:'REINFORCEMENT!',c:'#ffcf7a'});
        sfx('reinforce');
      }
    } else reinforcementT=0;
  }

  // player defeat → death animation then the defeat screen
  if (player.hp<=0 && scene==='playing'){
    if (player.state!=='dead') killFighter(player, null);
    outcomeT++;
    if (outcomeT>70 && scene==='playing'){ scene='defeat'; sfx('defeat'); }
  }

  // ---- CAMERA: follow the knight while walking, hold steady during a fight ----
  if (encounterState==='locked'){
    camX += (lockCamX - camX) * 0.12;
  } else {
    const target = clamp(player.x - W*0.45, 0, worldW - W);
    camX += (target - camX) * 0.1;
  }

  // ---- ENCOUNTER FLOW: walk into a gate to trigger it; clear it to advance ----
  if (scene==='playing' && encounterState==='walk' && gateIdx < level.gates.length
      && player.x >= level.gates[gateIdx].x){
    triggerGate();
  }
  if (scene==='playing' && encounterState==='locked' && enemies.length>0 && reinforcements.length===0
      && enemies.every(e=>e.state==='dead' && e.deathT>40)){
    bossActive=false; enemies.length=0; gateIdx++;
    if (gateIdx >= level.gates.length){ winLevel(); }
    else { encounterState='walk'; showBanner('CLEARED!', 'Advance  →'); sfx('clear'); }
  }

  // ---- THROWN / HELD ITEMS ----
  for (const it of items){
    if (it.held){ it.x = player.x + player.face*14; it.z = player.z; it.y = -42; continue; }
    if (it.thrown){
      it.x += it.vx; it.y += it.vy; it.vy += 0.5; it.rot += it.vx*0.06;
      // collide with an enemy mid-flight → damage + heavy STUN (bypasses shields)
      for (const e of enemies){ if (e.hp<=0) continue;
        if (Math.abs(e.x-it.x)<26 && Math.abs(e.z-it.z)<0.18 && it.y<-8 && it.y>-72){
          e.hp -= 9; e.flash=6; e.blocking=false; e.holdBlock=0;
          e.stunned = 95; e.hitstun = 95; e.state='hurt'; e.stateT=0;
          pushBack(e, Math.sign(it.vx||1), 4);
          addShake(5); freeze(5); spawnSpark(e.x, zToY(e.z)-40, '#ffe066', 14); spawnRing(e.x, zToY(e.z)-40, '#ffe066', 30);
          floatTexts.push({x:e.x, y:zToY(e.z)-82, t:30, txt:'STUN', c:'#ffe066'});
          if (e.hp<=0) killFighter(e, null);
          shatterItem(it); it.dead=true; break;
        }
      }
      if (!it.dead && it.y>=0){ it.y=0; shatterItem(it); it.dead=true; }   // lands and shatters
    }
  }
  items = items.filter(it=>!it.dead);

  // ---- PROJECTILES (arrows / bolts / fireballs / souls / boulders) ----
  for (const pr of projectiles){
    pr.x += pr.vx; if (pr.big) pr.rot += pr.vx*0.04;
    const trailC = pr.fire||pr.kind==='fireball' ? '#ff8a3a' : pr.kind==='soul' ? '#9fd0ff' : null;
    if (trailC) particles.push({x:pr.x, y:zToY(pr.z)+pr.y, vx:rand(-0.5,0.5), vy:rand(-0.6,0.2), life:rand(6,12), c:trailC, r:rand(1.5,2.6)});
    if (pr.x<camX-80 || pr.x>camX+W+80 || pr.life-- <=0){ pr.dead=true; continue; }
    if (player.hp<=0) continue;
    const rad = pr.big?28:20;
    const near = Math.abs(pr.x-player.x)<rad && Math.abs(pr.z-player.z)<0.15;
    if (!near) continue;
    if (player.iframe>0 || player.y < -55){ continue; }     // dodged or jumped over
    const hot = pr.fire || pr.kind==='fireball' || pr.kind==='soul';
    // shield blocks projectiles coming at the front (chips stamina; boulders chip hard)
    if (player.state==='block' && Math.sign(pr.vx) === -player.face){
      addShake(pr.big?5:2); freeze(3); spawnSpark(pr.x, zToY(pr.z)-42, hot?'#ffb060':'#cfe0ff', 6); spawnRing(player.x, zToY(player.z)-42, '#cfe0ff', 18);
      player.stamina -= pr.big?28:hot?10:6; player.staDelay=40;
      if (player.stamina<=0){ player.stamina=0; guardBreak(player, {x:pr.x, face:player.face}); }
      floatTexts.push({x:player.x, y:zToY(player.z)-78, t:26, txt:'BLOCK', c:'#9fb4ff'});
      pr.dead=true; continue;
    }
    // hit
    const admg = Math.round((pr.dmg||7) * DIFF[SETTINGS.difficulty].dmg);
    player.hp -= admg; player.flash=6; player.iframe=8; player.hitstun=pr.big?24:14; player.state='hurt'; player.stateT=0;
    pushBack(player, Math.sign(pr.vx), pr.knock||3); addShake(pr.big?7:4); freeze(pr.big?6:4);
    spawnSpark(player.x, zToY(player.z)-40, hot?'#ff8a3a':'#ff9a9a', hot?16:10);
    if (player.hp<=0) killFighter(player, null);
    else if (SETTINGS.dmgNumbers) floatTexts.push({x:player.x, y:zToY(player.z)-80, t:26, txt:''+admg, c:'#fff'});
    pr.dead=true;
  }
  projectiles = projectiles.filter(p=>!p.dead);

  // particles & floaters & effects
  for (const pa of particles){ pa.x+=pa.vx; pa.y+=pa.vy; pa.vy+=0.35; pa.life--; }
  particles = particles.filter(pa=>pa.life>0);
  for (const f of floatTexts){ f.y-=0.8; f.t--; }
  floatTexts = floatTexts.filter(f=>f.t>0);
  for (const g of ghosts){ g.life--; }
  ghosts = ghosts.filter(g=>g.life>0);
  for (const r of rings){ r.r += (r.max-r.r)*0.28; r.life-=0.09; }
  rings = rings.filter(r=>r.life>0);

  if (screenFlash>0) screenFlash *= 0.82;
  if (shake>0) shake*=0.85;
  if (shake<0.3) shake=0;
}
function shatterItem(it){
  const c = it.type==='rock' ? '#8a8378' : '#b5763e';
  for (let i=0;i<12;i++) particles.push({x:it.x, y:zToY(it.z)+Math.min(it.y,0), vx:rand(-3,3), vy:rand(-4,0), life:rand(10,20), c, r:rand(1.5,3.5)});
}

function enemyAI(e){
  if (e.hp<=0){ return; }
  e.blocking = false;
  if (e.stunned>0) e.stunned--;
  if (e.guardBreak>0) e.guardBreak--;
  if (e.atkCD>0) e.atkCD--;
  if (e.shootCD>0) e.shootCD--;
  if (!['idle','walk','block'].includes(e.state)) return;   // hurt/launched/attack play out elsewhere
  e.aiTimer--;
  const dx = player.x - e.x;
  const dz = player.z - e.z;
  const dist = Math.abs(dx);
  e.face = dx>0?1:-1;

  // ---- MINI-BOSSES dispatch to their own brains ----
  if (e.boss){ bossAI(e, dx, dz, dist); return; }

  // ---- RANGED: archer (arrow) & crossbowman (heavy bolt) ----
  if (e.type==='archer' || e.type==='xbow'){
    const slow = e.type==='xbow';
    const range = (slow?300:270) + (e._gap||(e._gap=rand(-50,60)));
    if (e.shootCD<=0 && Math.abs(dz)<0.12 && dist>120 && dist<(slow?540:430)){
      e.aiCommitted = true; startAttack(e, slow?'bolt':'shoot'); e.shootCD = slow?rand(210,300):rand(150,230); return;
    }
    moveRange(e, dx, dz, range, slow?1.4:1.8); return;
  }

  // ---- BATTLEMAGE: hurl fireballs at range, blink away when crowded ----
  if (e.type==='mage'){
    if (dist<115 && e.atkCD<=0){                          // teleport to safety
      const [lo,hi]=arenaBounds(); e.x = clamp(e.x - e.face*rand(160,230), lo+20, hi-20);
      e.atkCD = rand(50,90); spawnRing(e.x, zToY(e.z)-40, '#caa0ff', 32);
      for (let i=0;i<10;i++) particles.push({x:e.x, y:zToY(e.z)-30, vx:rand(-2,2), vy:rand(-3,0.5), life:rand(10,18), c:'#b89ae0', r:rand(2,3)});
      return;
    }
    if (e.shootCD<=0 && Math.abs(dz)<0.13 && dist>140 && dist<540){ e.aiCommitted=true; startAttack(e,'cast'); e.shootCD=rand(120,200); return; }
    moveRange(e, dx, dz, 300, 1.5); return;
  }

  // ---- CULTIST: hang back and raise skeletons ----
  if (e.type==='cultist'){
    if (e.shootCD<=0 && dist>120 && dist<560){ e.aiCommitted=true; startAttack(e,'summon'); e.shootCD=rand(220,320); return; }
    moveRange(e, dx, dz, 320, 1.4); return;
  }

  // ---- WOLF: fast, pounces when lined up at mid range ----
  if (e.type==='wolf'){
    const lined = Math.abs(dz)<0.13;
    if (e.atkCD<=0 && lined && dist>60 && dist<240){ startAttack(e,'wlunge'); e.atkCD=rand(70,120); e.aiCommitted=true; return; }
    let mvx=0,mvz=0; if (dist>48) mvx=Math.sign(dx); if (Math.abs(dz)>0.04) mvz=Math.sign(dz);
    e.vx=mvx*2.6; e.vz=mvz*0.016; e.state=(mvx||mvz)?'walk':'idle'; e.aiCommitted=false; return;
  }

  // ---- BOAR: charges in a straight line from range ----
  if (e.type==='boar'){
    const lined = Math.abs(dz)<0.15;
    if (e.atkCD<=0 && lined && dist>90 && dist<430){ startAttack(e,'bcharge2'); e.atkCD=rand(110,160); e.aiCommitted=true; return; }
    let mvx=0,mvz=0; if (dist>60) mvx=Math.sign(dx); if (Math.abs(dz)>0.05) mvz=Math.sign(dz);
    e.vx=mvx*1.4; e.vz=mvz*0.012; e.state=(mvx||mvz)?'walk':'idle'; e.aiCommitted=false; return;
  }

  // ---- SHIELD / ROYAL GUARD: reactively raise guard against an attack/incoming shot ----
  if ((e.type==='shield' || e.type==='guard') && e.guardBreak<=0){
    const inFront = (player.x - e.x)*e.face > 0;
    const incoming = projectiles.some(p=>!p.dead && Math.sign(p.vx)=== -e.face && Math.abs(p.x-e.x)<160 && Math.abs(p.z-e.z)<0.16);
    const guard = dist<(e.type==='guard'?110:90) && Math.abs(dz)<0.18 && inFront && (player.state==='attack' || incoming);
    if (guard){ e.state='block'; e.blocking=true; e.vx=0; e.vz=0; e.holdBlock=10; if (e.stamina>0) e.stamina-=0.4; return; }
  }

  // ---- GENERIC MELEE: grunt, spearman, skeleton, shield, guard ----
  const committed = enemies.filter(o=>o!==e && (o.state==='attack' || o.aiCommitted)).length;
  const cfg = ({
    grunt:    {reach:60, atk:'enemy',  spd:1.5, gap:46},
    spear:    {reach:92, atk:'thrust', spd:1.4, gap:80},
    skeleton: {reach:58, atk:'enemy',  spd:1.5, gap:44},
    shield:   {reach:64, atk:'sbash',  spd:1.3, gap:46},
    guard:    {reach:90, atk:(Math.random()<0.5?'thrust':'sbash'), spd:1.2, gap:64},
  })[e.type] || {reach:60, atk:'enemy', spd:1.5, gap:46};
  const wantsAttack = dist < cfg.reach && Math.abs(dz) < 0.14;
  if (wantsAttack && e.atkCD<=0 && committed < 2){
    e.aiCommitted = true; startAttack(e, cfg.atk);
    if (e.type==='grunt') e.chain = Math.random()<0.45 ? 1 : 0;
    e.atkCD = rand(70,130);
  } else {
    const targetGap = cfg.gap + (e._gap||(e._gap=rand(-10,30)));
    let mvx=0, mvz=0;
    if (dist > targetGap) mvx = Math.sign(dx); else if (dist < targetGap-14) mvx = -Math.sign(dx);
    if (Math.abs(dz) > 0.04) mvz = Math.sign(dz);
    e.vx = mvx*cfg.spd; e.vz = mvz*0.012; e.state = (mvx||mvz)?'walk':'idle'; e.aiCommitted = false;
  }
}
// keep-your-distance movement shared by ranged foes
function moveRange(e, dx, dz, range, spd){
  const dist = Math.abs(dx);
  let mvx=0, mvz=0;
  if (dist < range-30) mvx = -Math.sign(dx);
  else if (dist > range+30) mvx = Math.sign(dx);
  if (Math.abs(dz) > 0.04) mvz = Math.sign(dz);
  e.vx = mvx*spd; e.vz = mvz*0.012; e.state = (mvx||mvz)?'walk':'idle';
}
function moveToward(e, dx, dz, gap, spd, zspd){
  let mvx=0, mvz=0;
  if (Math.abs(dx) > gap) mvx = Math.sign(dx);
  if (Math.abs(dz) > 0.05) mvz = Math.sign(dz);
  e.vx = mvx*spd; e.vz = mvz*zspd; e.state = (mvx||mvz)?'walk':'idle'; e.aiCommitted = false;
}
// per-boss brains
function bossAI(e, dx, dz, dist){
  const lined = Math.abs(dz) < 0.18;
  if (e.type==='wolfboss'){
    if (e.atkCD<=0){
      if (e.hp < e.maxHp*0.65 && e.shootCD<=0 && enemies.filter(x=>x.type==='wolf'&&x.hp>0).length<2){ startAttack(e,'howl'); e.atkCD=rand(120,170); e.shootCD=rand(280,380); return; }
      if (lined && dist<440){ startAttack(e,'pounce'); e.atkCD=rand(85,135); return; }
    }
    moveToward(e, dx, dz, 70, 2.3, 0.015); return;
  }
  if (e.type==='treant'){
    if (e.atkCD<=0 && lined){
      if (dist<130){ startAttack(e,'tslam'); e.atkCD=rand(90,140); return; }
      if (dist<210){ startAttack(e,'tsweep'); e.atkCD=rand(100,150); return; }
    }
    moveToward(e, dx, dz, 96, 0.8, 0.008); return;          // slow but huge reach
  }
  if (e.type==='troll'){
    if (e.atkCD<=0 && lined){
      if (dist<104){ startAttack(e,'club'); e.atkCD=rand(90,140); return; }
      if (dist>190 && dist<560){ startAttack(e,'boulder'); e.atkCD=rand(120,170); return; }
    }
    moveToward(e, dx, dz, 82, 1.05, 0.010); return;
  }
  if (e.type==='wraith'){
    if (e.atkCD<=0){
      if (dist<92 && lined){ startAttack(e,'wslash'); e.atkCD=rand(70,110); return; }
      if (e.shootCD<=0 && enemies.filter(x=>x.type==='skeleton'&&x.hp>0).length<2 && Math.random()<0.5){
        e.iframe=24; spawnRing(e.x,zToY(e.z)-40,'#9fd0ff',40);   // phase-flicker as it conjures
        startAttack(e,'summon'); e.atkCD=rand(90,130); e.shootCD=rand(240,340); return;
      }
      if (dist>120 && lined){ startAttack(e,'soulbolt'); e.atkCD=rand(80,120); return; }
    }
    moveToward(e, dx, dz, 70, 1.8, 0.013); return;
  }
  if (e.type==='blackknight'){
    if (e.phase===1 && e.hp <= e.maxHp*0.5){           // enrage at half health
      e.phase=2; e.flash=10; addShake(9); screenFlash=Math.max(screenFlash,0.55);
      floatTexts.push({x:e.x, y:zToY(e.z)-112, t:54, txt:'ENRAGED!', c:'#ff7a4a'}); sfx('roar');
    }
    const fast = e.phase===2;
    if (e.atkCD<=0 && lined){
      if (dist<72){ startAttack(e, fast?'bkslam':'bkcombo'); e.atkCD=rand(fast?55:80, fast?100:130); return; }
      if (dist<360){ startAttack(e,'bcharge'); e.atkCD=rand(fast?80:110, fast?120:160); return; }
    }
    moveToward(e, dx, dz, 60, fast?2.2:1.6, 0.012); return;
  }
  moveToward(e, dx, dz, 70, 1.4, 0.012);
}

function updateFighter(f){
  f.stateT++;
  if (f.flash>0) f.flash--;
  if (f.iframe>0) f.iframe--;
  if (f.bladeFlash>0) f.bladeFlash--;

  // airborne physics (jump + juggle)
  if (f.y<0 || f.vy<0){
    f.vy += 0.6;            // gravity
    f.y += f.vy;
    if (f.y>=0){ f.y=0; f.vy=0;
      if (f.state==='launched' && f.hp>0){ f.state='hurt'; f.stateT=0; f.hitstun=20; addShake(3);
        spawnSpark(f.x, zToY(f.z), '#8a7', 6); }
      else if (f.state==='jump'){ f.state='idle'; addShake(1);
        spawnSpark(f.x, zToY(f.z), '#9a8', 4); }
      else if (f.state==='attack' && f.aerial){
        if (f.atkKind==='airheavy') plungeImpact(f);   // dive shockwave on landing
        f.state='idle'; f.aerial=false;
      }
    }
  }

  // attack timing
  if (f.state==='attack'){
    const d = f.atkDef;
    const total = d.wind + d.active + d.rec;
    if(!f.isPlayer && d.tele && f.stateT===Math.max(1,Math.floor(d.wind*0.72))) sfx('warn_ready');
    if (d.shoot || d.fireball || d.soul || d.boulder || d.summon || d.howl){
      // ranged / special effects fire once when the windup completes
      if (f.stateT===d.wind){
        if (d.shoot) fireArrow(f);
        else if (d.fireball) fireProjectile(f, 'fireball');
        else if (d.soul) fireProjectile(f, 'soul');
        else if (d.boulder) fireProjectile(f, 'boulder');
        else if (d.summon) summonAdd(f, 'skeleton');
        else if (d.howl) bossHowl(f);
      }
    } else if (f.stateT>=d.wind && f.stateT<d.wind+d.active){
      // overhead slam: ground-shaking shockwave on the first active frame
      if (d.slam && f.stateT===d.wind){ addShake(8); freeze(4); screenFlash=Math.max(screenFlash,0.5);
        const c1 = d.fire?'#ff8a3a':'#e0b070', c2 = d.fire?'#ffd24a':'#fff2c0';
        spawnRing(f.x, zToY(f.z), c1, 70); spawnRing(f.x, zToY(f.z), c2, 44);
        for (let i=0;i<14;i++) particles.push({x:f.x, y:zToY(f.z), vx:rand(-5,5), vy:rand(-5,-0.5), life:rand(12,24), c:d.fire?'#ff9a4a':'#9a8466', r:rand(2,4)});
        if (d.roots) eruptRoots(f);                          // treant: spikes burst from the ground
        sfx('slam'); }
      // lunge on active frames (grounded only) — chargers cover real ground
      if (f.y>=0 && !f.aerial) f.x += f.face * (d.charge ? (d.chargeSpd||7) : (d.sweep?0:1.6));
      if (d.charge && f.stateT%3===0) spawnSpark(f.x, zToY(f.z), '#8a7866', 3);   // dust trail
      if (!f.hasHitThisSwing) tryHit(f, d);
    }
    // dive: hold in the active window until it actually lands (plunge fires on landing)
    if (f.atkKind==='airheavy' && f.y<0){ f.stateT = Math.min(f.stateT, d.wind+d.active-1); }
    if (f.stateT>=total){
      if (f.aerial && f.y<0){ f.state='jump'; }            // recovered mid-air → keep falling
      else if (!f.isPlayer && f.chain>0 && f.atkKind==='enemy'){ f.chain--; startAttack(f,'jab'); } // grunt 2nd swing
      else { f.state='idle'; f.aerial=false;
        if (f.isPlayer && !f.aerial){ f.comboTimer = 26; } } // window to continue combo
    }
  }

  // timed states
  if (f.state==='hurt'){ if (f.hitstun>0) f.hitstun--; else if (f.y>=0) f.state='idle'; }
  if (f.state==='dash'){ if (f.stateT>10) f.state='idle'; }
  if (f.state==='block'){ /* held externally */ }
  if (f.state==='dead'){ f.vx*=0.9; f.deathT++; }
  // skeleton collapsed in a heap — reassemble after a beat (unless finished off first)
  if (f.state==='downed'){ f.vx*=0.9; if (--f.reform<=0){
      f.downed=false; f.hp=Math.round(f.maxHp*0.5); f.state='idle'; f.stateT=0; f.flash=8; f.iframe=10;
      spawnRing(f.x, zToY(f.z)-30, '#e8e2d0', 36); sfx('clear');
      floatTexts.push({x:f.x, y:zToY(f.z)-86, t:28, txt:'REFORM', c:'#e8e2d0'}); } }

  // horizontal / depth motion by state
  if (f.state==='launched'){
    f.x += f.vx; f.vx*=0.96;
  } else if (f.y<0){
    f.x += f.vx; f.vx*=0.99;                 // airborne: keep momentum (jump / aerial attack)
  } else if (['walk','idle','dash'].includes(f.state)){
    f.x += f.vx; f.z += f.vz;
  } else if (f.state==='hurt'){
    f.x += f.vx; f.vx*=0.88;
  } else {
    f.vx*=0.9;
  }

  // friction on stray vx
  if (Math.abs(f.vx)<0.05) f.vx=0;

  // clamp to arena (full world while walking, locked screen during an encounter)
  const [axlo,axhi] = arenaBounds();
  f.x = clamp(f.x, axlo, axhi);
  f.z = clamp(f.z, 0.05, 1.0);
  if(f.state==='walk'&&f.stateT%14===0&&(Math.abs(f.vx)>.2||Math.abs(f.vz)>.002)){
    particles.push({x:f.x-f.face*5,y:zToY(f.z)-1,vx:-f.face*rand(.2,1),vy:rand(-.8,-.2),life:rand(7,12),c:TH.path,r:rand(1.5,2.5)});
  }
}

// ---- render ----
function attackTelegraphType(d){
  if(d.summon||d.howl) return 'magic';
  if(d.shoot||d.bolt||d.fireball||d.soul||d.boulder||d.charge) return 'lane';
  if(d.aoe||d.slam) return 'area';
  return 'melee';
}
function drawGroundTelegraph(f){
  if(f.isPlayer||f.hp<=0||f.state!=='attack'||!f.atkDef||!f.atkDef.tele||f.stateT>=f.atkDef.wind)return;
  const d=f.atkDef, type=attackTelegraphType(d), p=clamp(f.stateT/d.wind,0,1);
  const urgent=p>0.72, alpha=0.16+0.30*p, y=zToY(f.z)+2, reach=Math.max(48,d.reach||0);
  const col=type==='magic'?'151,105,220':type==='area'?'255,142,58':'235,62,55';
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='rgba('+col+',0.55)';ctx.strokeStyle='rgba('+col+',0.95)';
  ctx.lineWidth=urgent?3:2; if(urgent&&Math.floor(gameT/3)%2===0)ctx.strokeStyle='#fff1c4';
  if(type==='area'){
    const r=Math.max(54,reach);ctx.beginPath();ctx.ellipse(f.x,y,r*p,18+16*p,0,0,7);ctx.fill();ctx.stroke();
  }else if(type==='lane'){
    const len=d.charge?Math.max(190,reach*3.2):Math.min(520,Math.abs(player.x-f.x)+35);
    const end=f.x+f.face*len, half=d.boulder?17:d.charge?14:8;
    ctx.beginPath();ctx.moveTo(f.x,y-half);ctx.lineTo(end,y-half);ctx.lineTo(end,y+half);ctx.lineTo(f.x,y+half);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.globalAlpha=0.5+0.4*p;ctx.beginPath();ctx.moveTo(f.x+f.face*12,y);ctx.lineTo(f.x+f.face*len*p,y);ctx.stroke();
  }else if(type==='magic'){
    const r=34+30*p;ctx.setLineDash([7,5]);ctx.beginPath();ctx.ellipse(f.x,y,r,r*0.35,0,0,7);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.ellipse(f.x,y,r*0.55,r*0.19,0,0,7);ctx.fill();
  }else{
    ctx.beginPath();ctx.moveTo(f.x,y);ctx.arc(f.x,y,reach*p,f.face>0?-0.38:Math.PI-0.38,f.face>0?0.38:Math.PI+0.38);ctx.closePath();ctx.fill();ctx.stroke();
  }
  if(urgent){ctx.globalAlpha=0.75+0.25*Math.sin(gameT*0.7);ctx.fillStyle='#fff1c4';ctx.beginPath();ctx.arc(f.x,y,4,0,7);ctx.fill();}
  ctx.restore();
}
function draw(){
  ctx.save();
  const sx = (Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.translate(sx, sy);

  // themed sky / atmosphere
  const g = ctx.createLinearGradient(0,0,0,FLOOR_TOP+40);
  g.addColorStop(0,TH.sky[0]); g.addColorStop(0.5,TH.sky[1]); g.addColorStop(1,TH.sky[2]);
  ctx.fillStyle = g; ctx.fillRect(-20,-20,W+40,FLOOR_TOP+62);
  drawChapterComposition();

  // distant silhouette (the destination beyond), parallax-scrolled a touch
  ctx.save(); ctx.translate(-camX*0.18, 0); drawSilhouette(TH.silhouette); ctx.restore();

  // birds / crows gliding across the sky
  for (const b of birds){ b.x += b.vx; if (b.x>W+30) b.x=-30;
    const by = b.y + Math.sin(gameT*0.02+b.ph)*8; const flap = Math.sin(gameT*0.25+b.ph)*4;
    ctx.strokeStyle='rgba(20,30,24,0.7)'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(b.x-6,by+flap); ctx.lineTo(b.x,by); ctx.lineTo(b.x+6,by+flap); ctx.stroke();
  }

  // far tree/haze silhouettes (parallax)

  for (const t of farTrees){ ctx.globalAlpha=0.5; ctx.fillStyle=t.c; ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1; ctx.restore();

  ctx.globalAlpha=TH.mistA; ctx.fillStyle=TH.mist;
  for (let i=0;i<3;i++){ const mx=((gameT*0.3+i*340)%(W+260))-130;
    ctx.beginPath(); ctx.ellipse(mx, FLOOR_TOP-30+i*16, 150, 22, 0, 0, 7); ctx.fill(); }
  ctx.globalAlpha=1;
  drawThemeAtmosphere();

  // shafts of light
  ctx.save(); ctx.globalAlpha=TH.shaftA; ctx.fillStyle=TH.shaft;
  for (let i=0;i<4;i++){ const x=100+i*230; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+50,0); ctx.lineTo(x+210,FLOOR_TOP); ctx.lineTo(x+120,FLOOR_TOP); ctx.closePath(); ctx.fill(); }
  ctx.restore();

  // ===== WORLD LAYER (everything below scrolls with the camera) =====
  ctx.save(); ctx.translate(-Math.round(camX), 0);

  // ground (spans the whole level width)
  const fg = ctx.createLinearGradient(0,FLOOR_TOP,0,H);
  fg.addColorStop(0,TH.floor[0]); fg.addColorStop(1,TH.floor[1]);
  ctx.fillStyle = fg; ctx.fillRect(-20,FLOOR_TOP,worldW+40,H-FLOOR_TOP+20);
  // a river band behind the lane (bridge theme)
  if (TH.water){
    const wg = ctx.createLinearGradient(0,FLOOR_TOP,0,FLOOR_TOP+40);
    wg.addColorStop(0,'#3a6e82'); wg.addColorStop(1,'#28525f');
    ctx.fillStyle=wg; ctx.fillRect(-20,FLOOR_TOP,worldW+40,40);
    ctx.globalAlpha=0.3; ctx.strokeStyle='#9fd0dc'; ctx.lineWidth=1.5;
    for (let i=0;i<Math.ceil(worldW/120);i++){ const wx=i*120+((gameT*0.6)%120); const wy=FLOOR_TOP+8+(i%3)*9;
      ctx.beginPath(); ctx.moveTo(wx,wy); ctx.quadraticCurveTo(wx+14,wy-3,wx+28,wy); ctx.stroke(); }
    ctx.globalAlpha=1;
  }
  // the fighting lane running the length of the level
  ctx.fillStyle = TH.path;
  ctx.beginPath(); ctx.moveTo(-70,FLOOR_TOP+34); ctx.lineTo(worldW+70,FLOOR_TOP+34); ctx.lineTo(worldW+70,H); ctx.lineTo(-70,H); ctx.closePath(); ctx.fill();
  drawChapterGround();
  drawLevelLandmarks();
  // ground detail: grass tufts & stones, scaled by depth
  for (const t of tufts){ const y=zToY(t.z), s=depthScale(t.z);
    if (t.grass){ ctx.strokeStyle=t.c; ctx.lineWidth=1.5*s; ctx.beginPath();
      ctx.moveTo(t.x,y); ctx.lineTo(t.x-3*s,y-7*s); ctx.moveTo(t.x,y); ctx.lineTo(t.x,y-9*s); ctx.moveTo(t.x,y); ctx.lineTo(t.x+3*s,y-7*s); ctx.stroke(); }
    else { ctx.fillStyle=t.c; ctx.beginPath(); ctx.ellipse(t.x,y,4*s,2.4*s,0,0,7); ctx.fill(); } }

  // mid-ground trees framing the lane (behind fighters)
  for (const t of midTrees) drawTree(t);

  // ground decorations (bushes, rocks, mushrooms, log)
  for (const d of decos) drawDeco(d);

  // floating motes — fireflies / spores / rising embers (themed)
  for (const ff of fireflies){
    const fx = ff.x + Math.sin(gameT*0.02*ff.sp + ff.ph)*ff.amp;
    const fy = ff.rise ? (FLOOR_TOP+220) - ((gameT*0.7*ff.sp + ff.ph*60) % 320) + Math.sin(gameT*0.05+ff.ph)*6
                       : ff.y + Math.cos(gameT*0.016*ff.sp + ff.ph)*ff.amp*0.6;
    const glow = 0.4 + 0.6*Math.abs(Math.sin(gameT*0.05*ff.sp + ff.ph));
    ctx.globalAlpha = glow*0.8; ctx.fillStyle = ff.c;
    ctx.beginPath(); ctx.arc(fx, fy, 1.8, 0, 7); ctx.fill();
    ctx.globalAlpha = glow*0.25; ctx.beginPath(); ctx.arc(fx, fy, 4.5, 0, 7); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ground items (throwables lying around)
  for (const it of items){ if (!it.held && !it.thrown) drawItem(it); }

  // attack shapes are painted on the ground beneath every fighter
  for (const e of enemies) drawGroundTelegraph(e);

  // dodge afterimages (under fighters)
  for (const gh of ghosts){ ctx.save(); ctx.globalAlpha = 0.32*(gh.life/12);
    const gy = zToY(gh.z)+gh.y; ctx.translate(gh.x, gy); ctx.rotate(gh.face*gh.roll*Math.PI*2);
    ctx.fillStyle = gh.color; const w=30*gh.s, h=64*gh.s;
    roundRect(-w*0.4, -h*0.7, w*0.8, h*0.5, 5); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-h*0.78,w*0.26,0,7); ctx.fill(); ctx.restore(); }
  ctx.globalAlpha=1;

  // draw fighters sorted by z (painter)
  const all = [player, ...enemies].filter(Boolean).sort((a,b)=>a.z-b.z);
  for (const f of all) drawFighter(f);

  // projectiles in flight
  for (const pr of projectiles){ const s=depthScale(pr.z), y=zToY(pr.z)+pr.y;
    ctx.save(); ctx.translate(pr.x, y);
    if (pr.kind==='fireball' || pr.kind==='soul'){
      const c = pr.kind==='soul' ? ['rgba(150,210,255,0.7)','rgba(110,170,255,0)','#cfeaff'] : ['rgba(255,150,60,0.75)','rgba(255,110,40,0)','#ffe07a'];
      const gl=ctx.createRadialGradient(0,0,1,0,0,18*s); gl.addColorStop(0,c[0]); gl.addColorStop(1,c[1]);
      ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(0,0,18*s,0,7); ctx.fill();
      ctx.fillStyle=c[2]; ctx.beginPath(); ctx.arc(0,0,5*s,0,7); ctx.fill();
    } else if (pr.kind==='boulder'){
      ctx.rotate(pr.rot||0);
      ctx.fillStyle='#7c746a'; ctx.beginPath(); ctx.arc(0,0,12*s,0,7); ctx.fill();
      ctx.fillStyle='#928a80'; ctx.beginPath(); ctx.arc(-3*s,-3*s,5*s,0,7); ctx.fill();
      ctx.fillStyle='#5a534a'; ctx.beginPath(); ctx.arc(4*s,3*s,3*s,0,7); ctx.fill();
    } else {                                                       // arrow / bolt
      ctx.scale(Math.sign(pr.vx),1);
      if (pr.fire){ const gl=ctx.createRadialGradient(0,0,1,0,0,16*s); gl.addColorStop(0,'rgba(255,160,60,0.6)'); gl.addColorStop(1,'rgba(255,120,40,0)');
        ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(0,0,16*s,0,7); ctx.fill(); }
      const len = pr.kind==='bolt'?9:12;
      ctx.strokeStyle = pr.fire?'#caa040':'#7a5a36'; ctx.lineWidth=(pr.kind==='bolt'?2.6:2)*s; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-len*s,0); ctx.lineTo(8*s,0); ctx.stroke();
      ctx.fillStyle = pr.fire?'#ffd24a':'#d8d2c0'; ctx.beginPath(); ctx.moveTo(8*s,0); ctx.lineTo(2*s,-2.6*s); ctx.lineTo(2*s,2.6*s); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = pr.fire?'#ff8a3a':'#b9b1a1'; ctx.beginPath(); ctx.moveTo(-len*s,0); ctx.lineTo(-(len+3)*s,-2.4*s); ctx.moveTo(-len*s,0); ctx.lineTo(-(len+3)*s,2.4*s); ctx.stroke();
    }
    ctx.restore();
  }

  // held + thrown items (in front of fighters)
  for (const it of items){ if (it.held || it.thrown) drawItem(it); }

  // foreground trees framing the screen (in front of fighters)
  for (const t of foreTrees){ ctx.globalAlpha=0.96; drawTree(t); } ctx.globalAlpha=1;

  // particles
  for (const pa of particles){ ctx.globalAlpha = clamp(pa.life/22,0,1); ctx.fillStyle=pa.c; ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;

  // expanding impact rings
  for (const r of rings){ ctx.globalAlpha=clamp(r.life,0,1)*0.8; ctx.strokeStyle=r.c; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 7); ctx.stroke(); }
  ctx.globalAlpha=1;

  // float texts
  ctx.textAlign='center'; ctx.font='bold 16px ui-monospace, monospace';
  for (const t of floatTexts){ ctx.globalAlpha=clamp(t.t/28,0,1); ctx.fillStyle=t.c; ctx.fillText(t.txt, t.x, t.y); }
  ctx.globalAlpha=1;

  ctx.restore(); // ===== end world layer =====

  // drifting falling leaves (screen-space atmosphere, over the scene)
  for (const lf of leaves){
    lf.y += lf.vy; lf.x += Math.sin(gameT*0.03*lf.sp + lf.sway)*0.6; lf.rot += lf.vr;
    if (lf.y > H+10){ lf.y = -10; lf.x = Math.random()*W; }
    ctx.save(); ctx.translate(lf.x, lf.y); ctx.rotate(lf.rot);
    ctx.fillStyle = lf.c; ctx.beginPath(); ctx.ellipse(0,0,lf.sz,lf.sz*0.5,0,0,7); ctx.fill();
    ctx.restore();
  }

  // ambient mood tint (fog/dusk/torch-dark) per theme
  if (TH.overlay){ ctx.fillStyle='rgba('+TH.overlay.c+','+TH.overlay.a+')'; ctx.fillRect(-20,-20,W+40,H+40); }

  // vignette for depth/mood
  const vg = ctx.createRadialGradient(W/2, H*0.45, H*0.3, W/2, H*0.5, H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=vg; ctx.fillRect(-20,-20,W+40,H+40);

  ctx.restore();

  // screen flash on big impacts (over everything, no shake)
  if (screenFlash>0.01){ ctx.fillStyle='rgba(255,255,255,'+(screenFlash*0.5).toFixed(3)+')'; ctx.fillRect(0,0,W,H); }

  // HUD overlay (no shake)
  drawHUD();
}
