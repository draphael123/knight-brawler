    ctx.fillStyle='#7c4f28'; ctx.beginPath(); ctx.ellipse(0,-8*s,6*s,2.5*s,0,0,7); ctx.fill();
  }
  ctx.restore();
}

const VISUAL_PROFILES={
  knight:{x:1,y:1,stance:1.05,back:'cape'},
  grunt:{x:1.02,y:0.96,stance:1.22,back:'rags'},
  archer:{x:0.86,y:1.02,stance:0.9,back:'quiver'},
  shield:{x:1.18,y:1.02,stance:1.18,back:'shortcape'},
  spear:{x:0.84,y:1.10,stance:0.82,back:'pennant'},
  xbow:{x:0.94,y:0.92,stance:1.28,back:'bolts'},
  skeleton:{x:0.78,y:1.04,stance:0.82,back:null},
  cultist:{x:1.08,y:1.05,stance:1.35,back:'robe'},
  guard:{x:1.18,y:1.10,stance:1.1,back:'royalcape'},
  mage:{x:1.04,y:1.08,stance:1.28,back:'robe'},
  wraith:{x:1.04,y:1.18,stance:1.2,back:'spectral'},
  blackknight:{x:1.32,y:1.16,stance:1.2,back:'warcape'}
};
function drawBackAccessory(f,w,h,s,dark,base,trim){
  const vp=VISUAL_PROFILES[f.type]||VISUAL_PROFILES.knight, sway=Math.sin(gameT*0.07+f.x*0.03)*4*s;
  if(!vp.back)return;
  if(['cape','shortcape','royalcape','warcape','rags'].includes(vp.back)){
    const long=vp.back==='warcape'||vp.back==='royalcape'||vp.back==='cape', rag=vp.back==='rags'||vp.back==='warcape';
    ctx.fillStyle=vp.back==='royalcape'?'#284b79':vp.back==='warcape'?'#551f27':vp.back==='rags'?'#6b3a32':dark;
    ctx.beginPath();ctx.moveTo(-w*0.28,-h*0.68);ctx.lineTo(w*0.22,-h*0.67);
    ctx.lineTo(w*0.36+sway,-h*(long?0.08:0.32));
    if(rag){ctx.lineTo(w*0.12+sway,-h*0.17);ctx.lineTo(-w*0.04+sway,-h*0.06);}
    ctx.lineTo(-w*0.36+sway,-h*(long?0.12:0.34));ctx.closePath();ctx.fill();
    if(vp.back==='royalcape'){ctx.strokeStyle=trim;ctx.lineWidth=1.5*s;ctx.stroke();}
  }else if(vp.back==='quiver'||vp.back==='bolts'){
    ctx.save();ctx.translate(-f.face*w*0.22,-h*0.55);ctx.rotate(-0.25*f.face);
    ctx.fillStyle='#5a3a24';roundRect(-5*s,-18*s,10*s,34*s,3*s);ctx.fill();
    ctx.strokeStyle=vp.back==='bolts'?'#b7b0a2':'#cbb58a';ctx.lineWidth=1.5*s;
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*2*s,-17*s);ctx.lineTo(i*2*s,-34*s-(i%2)*4*s);ctx.stroke();}ctx.restore();
  }else if(vp.back==='robe'||vp.back==='spectral'){
    const spectral=vp.back==='spectral', wave=Math.sin(gameT*0.09)*3*s;
    ctx.fillStyle=spectral?'rgba(85,140,165,0.55)':dark;ctx.beginPath();ctx.moveTo(-w*0.34,-h*0.58);ctx.lineTo(w*0.34,-h*0.58);
    ctx.lineTo(w*0.55+wave,0);ctx.lineTo(w*0.12+wave,-h*0.08);ctx.lineTo(-w*0.12-wave,0);ctx.lineTo(-w*0.55-wave,0);ctx.closePath();ctx.fill();
  }else if(vp.back==='pennant'){
    ctx.strokeStyle='#5b4327';ctx.lineWidth=2*s;ctx.beginPath();ctx.moveTo(-f.face*w*0.18,-h*0.3);ctx.lineTo(-f.face*w*0.18,-h*1.1);ctx.stroke();
    ctx.fillStyle='#657348';ctx.beginPath();ctx.moveTo(-f.face*w*0.18,-h*1.08);ctx.lineTo(-f.face*w*0.18+sway+18*f.face*s,-h);ctx.lineTo(-f.face*w*0.18,-h*0.9);ctx.fill();
  }
}
function drawCharacterDetails(f,w,h,s,dark,lite,trim,flashing){
  if(f.hp<=0)return;
  if(f.type==='grunt'){ctx.fillStyle=flashing?'#fff':'#7a4036';ctx.beginPath();ctx.moveTo(-w*.34,-h*.72);ctx.lineTo(-w*.52,-h*.48);ctx.lineTo(-w*.2,-h*.5);ctx.fill();}
  if(f.type==='shield'){ctx.fillStyle=flashing?'#fff':'#6b392d';ctx.fillRect(-w*.32,-h*.98,w*.64,4*s);}
  if(f.type==='spear'){ctx.fillStyle=trim;ctx.beginPath();ctx.moveTo(0,-h*1.12);ctx.lineTo(-w*.12,-h*.94);ctx.lineTo(w*.12,-h*.94);ctx.fill();}
  if(f.type==='xbow'){ctx.fillStyle=dark;ctx.beginPath();ctx.moveTo(-w*.3,-h*.94);ctx.lineTo(0,-h*1.05);ctx.lineTo(w*.3,-h*.94);ctx.fill();}
  if(f.type==='guard'){ctx.fillStyle=trim;ctx.beginPath();ctx.moveTo(-w*.08,-h*.98);ctx.lineTo(0,-h*1.23);ctx.lineTo(w*.08,-h*.98);ctx.fill();}
  if(f.type==='mage'){const pulse=.5+.5*Math.sin(gameT*.1);ctx.fillStyle='rgba(255,110,50,'+(0.25+pulse*.35)+')';ctx.beginPath();ctx.arc(0,-h*.83,5*s+pulse*2*s,0,7);ctx.fill();}
  if(f.type==='wraith'){ctx.strokeStyle='rgba(150,220,255,.55)';ctx.lineWidth=2*s;for(let i=0;i<3;i++){const yy=-h*(.35+i*.16),wave=Math.sin(gameT*.08+i)*5*s;ctx.beginPath();ctx.moveTo(-w*.4,yy);ctx.quadraticCurveTo(wave,yy-4*s,w*.4,yy);ctx.stroke();}}
  if(f.type==='blackknight'){ctx.fillStyle=flashing?'#fff':'#121015';for(const side of[-1,1]){ctx.beginPath();ctx.moveTo(side*w*.28,-h*.9);ctx.lineTo(side*w*.5,-h*1.06);ctx.lineTo(side*w*.42,-h*.76);ctx.fill();}}
}

function drawFighter(f){
  // non-humanoid creatures have their own renderers
  if (f.body==='wolf'){ drawWolf(f); return; }
  if (f.body==='boar'){ drawBoar(f); return; }
  if (f.body==='treant'){ drawTreant(f); return; }
  if (f.body==='troll'){ drawTroll(f); return; }

  const baseY = zToY(f.z);
  const s = depthScale(f.z);
  const fx = f.x, fy = baseY + f.y;
  const vp=VISUAL_PROFILES[f.type]||VISUAL_PROFILES.knight;
  const w = f.w*s*vp.x, h = f.h*s*vp.y;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(fx, baseY, w*0.55, w*0.22, 0, 0, 7); ctx.fill();

  ctx.save();
  ctx.translate(fx, fy);
  // Hard offset shadow reads like an inked sprite edge against busy scenery.
  ctx.shadowColor='rgba(5,4,9,.88)';ctx.shadowBlur=0;ctx.shadowOffsetX=2*s;ctx.shadowOffsetY=2*s;

  // flash white on hit
  const flashing = f.flash>0;
  let body = flashing ? '#ffffff' : f.color;
  if (f.hp<=0) body = '#5a5566';
  const winding = f.state==='attack' && f.stateT < f.atkDef.wind;     // in attack windup

  // ranged aim telegraph — a dashed line toward the target while drawing/charging
  if (!f.isPlayer && f.atkDef && (f.atkDef.shoot||f.atkDef.bolt||f.atkDef.fireball||f.atkDef.soul||f.atkDef.boulder) && winding){
    const pulse = 0.4 + 0.6*(f.stateT/f.atkDef.wind);
    const col = f.atkDef.fireball ? '255,150,60' : f.atkDef.soul ? '150,220,255' : '255,90,90';
    ctx.save(); ctx.setLineDash([5*s,4*s]);
    ctx.strokeStyle = 'rgba('+col+','+(0.3+0.5*pulse).toFixed(2)+')'; ctx.lineWidth=1.6*s;
    ctx.beginPath(); ctx.moveTo(f.face*w*0.4, -h*0.62); ctx.lineTo(f.face*340*s, -h*0.62); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  // stunned — circling stars above the head
  if (f.stunned>0 && f.hp>0){
    ctx.save(); ctx.fillStyle='#ffe066'; ctx.textAlign='center';
    ctx.font='bold '+(13*s)+'px ui-monospace, monospace';
    for (let i=0;i<3;i++){ const a=gameT*0.16 + i*2.1; ctx.fillText('★', Math.cos(a)*13*s, -h*1.05 + Math.sin(a)*4*s); }
    ctx.restore();
  }

  // lean by state
  let lean = 0;
  if (f.state==='attack'){ const d=f.atkDef; if (f.stateT<d.wind) lean=-0.18; else if (f.stateT<d.wind+d.active) lean=0.28; }
  if (f.state==='hurt') lean = -f.face*0.22;
  if (f.state==='launched') lean = 0.5;
  if (f.state==='jump') lean = 0.12;       // slight forward tuck in the air
  ctx.rotate(lean*f.face);

  // death — topple over and fade out
  if (f.state==='dead'){
    const dt = f.deathT;
    ctx.rotate(f.face * clamp(dt/15,0,1) * 1.45);          // fall flat
    ctx.translate(0, clamp(dt/15,0,1)*h*0.16);             // settle to the ground
    ctx.globalAlpha = clamp(1 - (dt-48)/26, 0, 1);         // fade after a beat
  } else if (f.state==='downed'){
    // skeleton heap — collapsed flat, faintly shuddering as it gathers itself
    ctx.rotate(f.face*1.5); ctx.translate(0,h*0.18);
    ctx.globalAlpha = 0.55 + 0.25*Math.sin(gameT*0.4);
  } else {
    // expressive squash/stretch + idle breathing
    let bob=0, sqx=1, sqy=1;
    if (f.state==='idle'){ bob = Math.sin(gameT*0.07 + f.x*0.1)*1.2*s; }
    else if (f.state==='walk'){ bob = -Math.abs(Math.sin(f.stateT*0.4))*2.2*s; }
    else if (f.state==='jump'){ sqy = f.vy<0 ? 1.12 : 0.93; sqx = 2 - sqy; }
    else if (f.state==='attack' && f.stateT<f.atkDef.wind){ sqy=0.95; sqx=1.05; }   // anticipation crouch
    if (bob) ctx.translate(0, bob);
    if (sqx!==1 || sqy!==1) ctx.scale(sqx, sqy);
  }

  // whirlwind special — stay upright; a hip-turn squash sells the spin (the blade circles)
  if (f.atkKind==='special' && f.state==='attack' && f.stateT>=f.atkDef.wind){
    const prog = clamp((f.stateT-f.atkDef.wind)/f.atkDef.active,0,1);
    ctx.scale(1 - 0.3*Math.abs(Math.sin(prog*Math.PI*2)), 1 + 0.05*Math.abs(Math.sin(prog*Math.PI*2)));
  }

  // dodge roll — tuck and spin a full rotation about the torso
  if (f.state==='dash'){ const pr=clamp(f.stateT/12,0,1); ctx.translate(0,-h*0.4); ctx.rotate(f.face*pr*Math.PI*2); ctx.translate(0,h*0.4); }

  // ---- armour palette (metallic shading) ----
  const P = f.pal;
  const base = flashing?'#fff':(f.hp<=0?'#595563':P.base);
  const lite = flashing?'#fff':(f.hp<=0?'#6b6675':P.lite);
  const dark = flashing?'#fff':(f.hp<=0?'#403c4a':P.dark);
  const trim = flashing?'#fff':(f.hp<=0?'#4a4654':P.trim);
  const blade = flashing?'#fff':((!f.isPlayer && winding)?'#ff6a6a':'#e4e9f5');
  drawBackAccessory(f,w,h,s,dark,base,trim);
  const stride = (f.state==='walk') ? Math.sin(f.stateT*0.4) : 0;
  const lx = -w*0.27*vp.stance + stride*5*s, rx = w*(0.03+(vp.stance-1)*0.08) - stride*5*s;

  // ---- legs: greaves, knee-cops, sabatons ----
  ctx.fillStyle = dark;
  roundRect(lx, -h*0.32, w*0.24, h*0.32, 3*s); ctx.fill();
  roundRect(rx, -h*0.32, w*0.24, h*0.32, 3*s); ctx.fill();
  ctx.fillStyle = base;
  ctx.beginPath(); ctx.arc(lx+w*0.12, -h*0.18, w*0.07, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(rx+w*0.12, -h*0.18, w*0.07, 0, 7); ctx.fill();
  ctx.fillStyle = dark;
  roundRect(lx-2*s, -h*0.05, w*0.30, h*0.055, 2*s); ctx.fill();
  roundRect(rx-2*s, -h*0.05, w*0.30, h*0.055, 2*s); ctx.fill();

  // ---- fauld (armoured skirt) ----
  ctx.fillStyle = base;
  ctx.beginPath();
  ctx.moveTo(-w*0.34,-h*0.40); ctx.lineTo(w*0.34,-h*0.40);
  ctx.lineTo(w*0.40,-h*0.19); ctx.lineTo(-w*0.40,-h*0.19); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = dark; ctx.lineWidth=1.2*s;
  for (let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*w*0.16,-h*0.40); ctx.lineTo(i*w*0.20,-h*0.19); ctx.stroke(); }

  // ---- far pauldron (behind torso) ----
  ctx.fillStyle = dark; ctx.beginPath(); ctx.arc(-f.face*w*0.37,-h*0.62,w*0.18,0,7); ctx.fill();

  // ---- cuirass / breastplate ----
  ctx.fillStyle = base; roundRect(-w*0.36,-h*0.70,w*0.72,h*0.34,6*s); ctx.fill();
  ctx.fillStyle = lite;                                   // sheen highlight
  ctx.beginPath(); ctx.moveTo(-w*0.06,-h*0.68); ctx.lineTo(w*0.05,-h*0.68);
  ctx.lineTo(-w*0.01,-h*0.42); ctx.lineTo(-w*0.13,-h*0.42); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = dark; ctx.lineWidth=1.4*s;            // central ridge
  ctx.beginPath(); ctx.moveTo(0,-h*0.66); ctx.lineTo(0,-h*0.42); ctx.stroke();
  ctx.fillStyle = trim; ctx.fillRect(-w*0.36,-h*0.42,w*0.72,3.5*s);    // belt
  ctx.fillStyle = lite; roundRect(-w*0.15,-h*0.74,w*0.30,h*0.06,2*s); ctx.fill(); // gorget

  // ---- helm ----
  ctx.fillStyle = base; roundRect(-w*0.22,-h*0.94,w*0.44,h*0.24,7*s); ctx.fill();
  ctx.fillStyle = lite; ctx.fillRect(-w*0.22,-h*0.90,w*0.44,2*s);             // brow line
  ctx.fillStyle = '#0d0b14'; ctx.fillRect(-w*0.19,-h*0.84,w*0.38,3.5*s);      // visor slit
  ctx.fillStyle = dark; for (let i=0;i<3;i++) ctx.fillRect(-w*0.09+i*w*0.08,-h*0.785,1.6*s,1.6*s); // breaths
  if (P.plume && f.hp>0){                                                      // crest / plume
    ctx.fillStyle = flashing?'#fff':P.plume;
    if (f.isPlayer){ ctx.beginPath(); ctx.moveTo(-w*0.04,-h*0.96);
      ctx.quadraticCurveTo(0,-h*1.16,w*0.17,-h*1.0); ctx.quadraticCurveTo(w*0.04,-h*1.0,-w*0.04,-h*0.93);
      ctx.closePath(); ctx.fill(); }
    else { ctx.beginPath(); ctx.ellipse(0,-h*1.0,w*0.09,h*0.085,0,0,7); ctx.fill(); }
  }
  // grunt wears a kettle-hat brim; archers & robed casters wear a cloth hood
  if (f.type==='grunt' && f.hp>0){
    ctx.fillStyle = flashing?'#fff':dark;
    ctx.beginPath(); ctx.ellipse(0,-h*0.81, w*0.32, h*0.035, 0,0,7); ctx.fill();
  } else if ((f.type==='archer' || f.hood) && f.hp>0){
    ctx.fillStyle = flashing?'#fff':dark;
    ctx.beginPath(); ctx.moveTo(-w*0.26,-h*0.80);
    ctx.quadraticCurveTo(-w*0.04,-h*1.14, w*0.30,-h*0.86);
    ctx.quadraticCurveTo(w*0.06,-h*0.80, -w*0.26,-h*0.80); ctx.closePath(); ctx.fill();
    if (f.hood){ ctx.fillStyle='rgba(0,0,0,0.55)';                          // shadowed face under the hood
      ctx.beginPath(); ctx.ellipse(0,-h*0.83, w*0.13, h*0.05, 0,0,7); ctx.fill(); }
  }
  // skeleton skull — eye sockets + jaw lines read as bone
  if (f.bones && f.hp>0 && f.state!=='downed'){
    ctx.fillStyle='#2a2620';
    ctx.beginPath(); ctx.arc(-w*0.10,-h*0.84, w*0.06, 0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.10,-h*0.84, w*0.06, 0,7); ctx.fill();
    ctx.strokeStyle='#2a2620'; ctx.lineWidth=1.2*s;
    ctx.beginPath(); ctx.moveTo(-w*0.12,-h*0.74); ctx.lineTo(w*0.12,-h*0.74); ctx.stroke();
  }
  drawCharacterDetails(f,w,h,s,dark,lite,trim,flashing);

  // ---- near pauldron (over the torso) ----
  ctx.fillStyle = base; ctx.beginPath(); ctx.arc(f.face*w*0.37,-h*0.62,w*0.19,0,7); ctx.fill();
  ctx.fillStyle = lite; ctx.beginPath(); ctx.arc(f.face*w*0.35,-h*0.65,w*0.10,0,7); ctx.fill();

  // ---- sword / greatsword arm + blade ----
  if (f.weapon==='sword' || f.weapon==='greatsword'){
    const gs = f.weapon==='greatsword';
    let armAng = -0.35, bladeLen = w*(gs?1.4:0.95);
    if (f.state==='attack'){ const d=f.atkDef; const sw=f.stateT-d.wind;
      bladeLen = w*(gs?1.4:0.95) + d.reach*s*0.45;
      if (f.atkKind==='special' && sw>=0){ armAng = clamp(sw/d.active,0,1)*Math.PI*2; }   // full-circle sweep
      else if (sw<0){ armAng = (f.atkKind==='rising') ? 1.4 : -1.5; }                      // windup
      else if (sw<d.active){ const p=clamp(sw/d.active,0,1);
        armAng = (f.atkKind==='rising') ? (1.4 - p*2.7) : (-1.5 + p*2.1); }                // swing
      else { armAng = (f.atkKind==='rising') ? -1.1 : 0.3; }
    }
    ctx.save();
    ctx.translate(f.face*w*0.26, -h*0.56);
    ctx.rotate(armAng*f.face);
    const th = gs?4.4:2.8;                                                        // blade thickness
    ctx.strokeStyle = dark; ctx.lineWidth=3.5*s; ctx.lineCap='round';            // grip
    ctx.beginPath(); ctx.moveTo(f.face*w*0.02,0); ctx.lineTo(f.face*w*0.16,0); ctx.stroke();
    ctx.strokeStyle = trim; ctx.lineWidth=2.6*s;                                 // crossguard
    ctx.beginPath(); ctx.moveTo(f.face*w*0.16,-(gs?9:6)*s); ctx.lineTo(f.face*w*0.16,(gs?9:6)*s); ctx.stroke();
    ctx.fillStyle = trim; ctx.beginPath(); ctx.arc(0,0,2.6*s,0,7); ctx.fill();   // pommel
    const b0 = f.face*w*0.18, b1 = f.face*(w*0.18+bladeLen);                      // tapered blade
    ctx.fillStyle = blade;
    ctx.beginPath(); ctx.moveTo(b0,-th*s); ctx.lineTo(b1-f.face*6*s,-th*0.7*s); ctx.lineTo(b1,0);
    ctx.lineTo(b1-f.face*6*s,th*0.7*s); ctx.lineTo(b0,th*s); ctx.closePath(); ctx.fill();
    if (gs && f.atkDef && f.atkDef.fire){ ctx.strokeStyle='rgba(255,140,60,0.7)'; ctx.lineWidth=3*s; // fiery edge in phase 2
      ctx.beginPath(); ctx.moveTo(b0,0); ctx.lineTo(b1,0); ctx.stroke(); }
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1*s;                   // fuller
    ctx.beginPath(); ctx.moveTo(b0+f.face*3*s,0); ctx.lineTo(b1-f.face*9*s,0); ctx.stroke();
    if (f.bladeFlash>0){ ctx.globalAlpha = clamp(f.bladeFlash/7,0,1);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth=6*s; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(b0,0); ctx.lineTo(b1,0); ctx.stroke(); ctx.globalAlpha=1; }
    ctx.restore();
  }

  // ---- spearman / guard polearm ----
  if (f.weapon==='spear'){
    let ext = 0;                                                                 // thrust extension during active frames
    if (f.state==='attack'){ const d=f.atkDef; const sw=f.stateT-d.wind;
      ext = sw<0 ? -w*0.2*(1+sw/d.wind) : sw<d.active ? d.reach*s*0.7*clamp(sw/d.active,0,1) : d.reach*s*0.5; }
    ctx.save(); ctx.translate(f.face*(w*0.2+ext), -h*0.56);
    ctx.strokeStyle = flashing?'#fff':'#6e4a2a'; ctx.lineWidth=2.6*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-f.face*w*0.5,0); ctx.lineTo(f.face*w*0.7,0); ctx.stroke();   // shaft
    ctx.fillStyle = flashing?'#fff':'#cfd6e0';                                    // leaf-blade head
    ctx.beginPath(); ctx.moveTo(f.face*w*0.7,0); ctx.lineTo(f.face*w*0.52,-4.5*s); ctx.lineTo(f.face*w*0.52,4.5*s); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // ---- crossbow ----
  if (f.weapon==='crossbow'){
    const drawing = f.state==='attack';
    ctx.save(); ctx.translate(f.face*w*0.34, -h*0.6);
    ctx.strokeStyle = flashing?'#fff':'#4a3a2a'; ctx.lineWidth=3*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-f.face*w*0.1,0); ctx.lineTo(f.face*w*0.5,0); ctx.stroke();    // stock
    ctx.strokeStyle = flashing?'#fff':'#7a6a52'; ctx.lineWidth=2.4*s;
    ctx.beginPath(); ctx.moveTo(f.face*w*0.4,-9*s); ctx.lineTo(f.face*w*0.4,9*s); ctx.stroke(); // bow arms
    ctx.strokeStyle='#d8d2c0'; ctx.lineWidth=1*s;
    ctx.beginPath(); ctx.moveTo(f.face*w*0.4,-9*s); ctx.lineTo(f.face*(drawing?w*0.16:w*0.45),0); ctx.lineTo(f.face*w*0.4,9*s); ctx.stroke();
    ctx.restore();
  }

  // ---- caster staff (cultist / mage) — tip glows while channeling ----
  if (f.weapon==='staff'){
    const channel = f.state==='attack';
    const glow = channel ? clamp(f.stateT/f.atkDef.wind,0,1) : 0;
    ctx.save(); ctx.translate(f.face*w*0.3, -h*0.5);
    ctx.strokeStyle = flashing?'#fff':'#4a3526'; ctx.lineWidth=3*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0, h*0.36); ctx.lineTo(0,-h*0.5); ctx.stroke();   // shaft up past the head
    const orbC = f.type==='mage' ? '#ff7a3a' : '#a86ad0';
    if (glow>0){ ctx.globalAlpha=0.5*glow; ctx.fillStyle=orbC;

}

function enemyStatus(f){

}

function drawTroll(f){

  ctx.fillStyle=P.tusk; ctx.beginPath(); ctx.moveTo(w*0.06,-h*0.78); ctx.lineTo(w*0.1,-h*0.7); ctx.lineTo(w*0.14,-h*0.78); ctx.closePath(); ctx.fill();  // tusks

cv.addEventListener('mousemove', e=>{ const p=canvasPos(e); mouse.x=p.x; mouse.y=p.y; });

function hit(x,y,w,h){ return mouse.x>=x && mouse.x<=x+w && mouse.y>=y && mouse.y<=y+h; }

}

// ================= SETTINGS =================
function drawSettings(){
  drawForestBackdrop(0.5);
  ctx.textAlign='center'; ctx.fillStyle='#e0c46a'; ctx.font='bold 26px ui-monospace, monospace';
  ctx.fillText('SETTINGS', W/2, 86);
  const cx=W/2;
  const row = (y, label, val, fn)=>{
    ctx.fillStyle='#cbb88a'; ctx.font='14px ui-monospace, monospace'; ctx.textAlign='right';
    ctx.fillText(label, cx-20, y+22);
    if (button(cx+10, y, 190, 32, val, {size:14})){ fn(); saveSettings(); }
  };
  row(120, 'Difficulty', DIFF[SETTINGS.difficulty].name, ()=>{ SETTINGS.difficulty=(SETTINGS.difficulty+1)%DIFF.length; });
  row(164, 'Sound effects', SETTINGS.soundOn?'ON':'OFF', ()=>{ SETTINGS.soundOn=!SETTINGS.soundOn; if(SETTINGS.soundOn) sfx('ui'); });
  row(208, 'Music', SETTINGS.musicOn?'ON':'OFF', ()=>{ SETTINGS.musicOn=!SETTINGS.musicOn; });
  row(252, 'Screen shake', SETTINGS.shakeOn?'ON':'OFF', ()=>{ SETTINGS.shakeOn=!SETTINGS.shakeOn; });
  row(296, 'Damage numbers', SETTINGS.dmgNumbers?'ON':'OFF', ()=>{ SETTINGS.dmgNumbers=!SETTINGS.dmgNumbers; });
  if (button(cx-95, 344, 190, 30, 'RESET PROGRESS', {size:12})) resetProgress();
  if (button(20, H-50, 120, 34, '← BACK', {size:13})){ scene='title'; }
}

// ================= END OVERLAY (victory / defeat) =================
function drawEndOverlay(){
  outcomeT++;
  ctx.fillStyle='rgba(8,6,14,'+Math.min(0.62,outcomeT/120).toFixed(2)+')'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if (scene==='victory'){
    ctx.fillStyle='#ffe9b0'; ctx.font='bold 46px ui-monospace, monospace'; ctx.fillText('VICTORY!', W/2, H/2-54);
    ctx.fillStyle='#d8b96a'; ctx.font='16px ui-monospace, monospace'; ctx.fillText(level.name+' cleared  ·  Score '+score, W/2, H/2-20);
    const last = levelIdx>=LEVELS.length-1;
    if (last){ ctx.fillStyle='#9fe0a0'; ctx.font='14px ui-monospace, monospace'; ctx.fillText('You have cleared the campaign!', W/2, H/2+4); }
    if (!last && button(W/2-200, H/2+22, 185, 44, 'NEXT LEVEL')) startLevel(levelIdx+1);
    if (button(W/2+15, H/2+22, 185, 44, 'WORLD MAP')) scene='map';
  } else {
    ctx.fillStyle='#ff8a8a'; ctx.font='bold 46px ui-monospace, monospace'; ctx.fillText('YOU FELL', W/2, H/2-54);
    ctx.fillStyle='#cbb88a'; ctx.font='15px ui-monospace, monospace'; ctx.fillText('Score '+score, W/2, H/2-20);
    if (button(W/2-200, H/2+22, 185, 44, 'RETRY')) startLevel(levelIdx);
    if (button(W/2+15, H/2+22, 185, 44, 'WORLD MAP')) scene='map';
  }
}

// scene keyboard shortcuts
addEventListener('keydown', e=>{ const k=e.key.toLowerCase();
  if (k==='enter' && scene==='title') scene='map';
  if (k==='m'){
    if(scene==='codex') scene=codexReturn;
    else if(['title','map','playing'].includes(scene)) openCodex(scene);
  }
  if (k==='escape'){
    if(scene==='codex') scene=codexReturn;
    else if(scene==='settings'||scene==='map') scene='title';
    else if(scene==='playing') scene='map';
  }
});

// ================= AUDIO (procedural WebAudio — no asset files) =================
const AUDIO = (function(){
  let actx=null, master=null, sGain=null, mGain=null, noiseBuf=null;
  let musicPlaying=false, schedTimer=null, nextStep=0, stepClock=0;
  function ensure(){
    if (actx) return actx;
    try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return null; }
    master = actx.createGain(); master.gain.value=0.85; master.connect(actx.destination);
    sGain = actx.createGain(); sGain.gain.value=0.85; sGain.connect(master);
    mGain = actx.createGain(); mGain.gain.value=0.34; mGain.connect(master);
    noiseBuf = actx.createBuffer(1, actx.sampleRate*0.6, actx.sampleRate);
    const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    return actx;
  }
  function unlock(){ if(ensure() && actx.state==='suspended') actx.resume(); }
  // --- primitive voices ---
  function tone(freq,t0,dur,type,gain,dest){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(dest||sGain); o.start(t0); o.stop(t0+dur+0.03);
  }
  function glide(f0,f1,t0,dur,type,gain,dest){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sawtooth'; o.frequency.setValueAtTime(f0,t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t0+dur);
    g.gain.setValueAtTime(gain,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(dest||sGain); o.start(t0); o.stop(t0+dur+0.03);
  }
  function noise(t0,dur,gain,ftype,ffreq,dest){
    const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const f=actx.createBiquadFilter(); f.type=ftype||'bandpass'; f.frequency.value=ffreq||1200; f.Q.value=0.8;
    const g=actx.createGain(); g.gain.setValueAtTime(gain,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    s.connect(f); f.connect(g); g.connect(dest||sGain); s.start(t0); s.stop(t0+dur+0.03);
  }
  function play(name){
    if(!SETTINGS.soundOn || !ensure()) return; unlock();
    const t=actx.currentTime, vary=0.94+Math.random()*0.12;
    switch(name){
      case 'swing':     noise(t,0.12,0.28,'bandpass',1300*vary); glide(900*vary,300,t,0.13,'triangle',0.10); break;
      case 'swingheavy':noise(t,0.22,0.42,'bandpass',720*vary); glide(560*vary,130,t,0.22,'sawtooth',0.14); tone(95,t+0.04,0.16,'sine',0.12); break;
      case 'hit':       glide(190*vary,58,t,0.16,'square',0.28); noise(t,0.09,0.34,'lowpass',1050); tone(1250*vary,t,0.045,'triangle',0.08); break;
      case 'hitheavy':  glide(155*vary,42,t,0.26,'square',0.38); noise(t,0.18,0.48,'lowpass',680); tone(82,t,0.25,'sine',0.22); break;
      case 'block':     tone(1480*vary,t,0.08,'square',0.16); tone(2240*vary,t+0.012,0.14,'triangle',0.13); noise(t,0.08,0.16,'highpass',2800); break;
      case 'guardbreak':noise(t,0.34,0.48,'highpass',2200); glide(460*vary,95,t,0.34,'sawtooth',0.18); tone(90,t+0.04,0.30,'sine',0.20); break;
      case 'slain':     glide(420,70,t,0.34,'sawtooth',0.20); noise(t,0.18,0.35,'lowpass',1000); break;
      case 'jump':      glide(280,620,t,0.14,'triangle',0.14); break;
      case 'dodge':     noise(t,0.18,0.25,'bandpass',1600); break;
      case 'throw':     glide(600,200,t,0.18,'triangle',0.12); noise(t,0.10,0.2,'bandpass',1400); break;
      case 'arrow':     noise(t,0.06,0.20,'highpass',3200); glide(1500*vary,470,t+0.015,0.15,'sawtooth',0.10); break;
      case 'warn_melee':tone(420,t,0.09,'square',0.11); break;
      case 'warn_lane': glide(520,760,t,0.16,'triangle',0.11); break;
      case 'warn_area': tone(145,t,0.20,'sine',0.20); noise(t,0.12,0.12,'lowpass',500); break;
      case 'warn_magic':[330,440,554].forEach((f,i)=>tone(f,t+i*0.045,0.14,'sine',0.08)); break;
      case 'warn_ready':tone(1120,t,0.055,'square',0.13); tone(1680,t+0.035,0.06,'square',0.10); break;
      case 'reinforce': [262,392,523].forEach((f,i)=>tone(f,t+i*0.065,0.15,'triangle',0.12)); noise(t,0.18,0.14,'bandpass',900); break;
      case 'ui':        tone(660,t,0.05,'square',0.14); tone(990,t+0.04,0.06,'square',0.10); break;
      case 'start':     [392,523,659].forEach((f,i)=>tone(f,t+i*0.09,0.18,'triangle',0.16)); break;
      case 'clear':     [523,659,784,1047].forEach((f,i)=>tone(f,t+i*0.07,0.16,'square',0.12)); break;
      case 'roar':      glide(140,70,t,0.55,'sawtooth',0.30); noise(t,0.5,0.35,'lowpass',500); break;
      case 'slam':      glide(160,40,t,0.34,'sine',0.5); noise(t,0.22,0.55,'lowpass',600); break;
      case 'bossdie':   [330,262,196,131].forEach((f,i)=>tone(f,t+i*0.13,0.4,'sawtooth',0.2)); glide(120,40,t,0.7,'sine',0.4); break;
      case 'victory':   [523,659,784,1047,1319].forEach((f,i)=>tone(f,t+i*0.12,0.34,'triangle',0.18)); break;
      case 'defeat':    [392,330,262,196].forEach((f,i)=>tone(f,t+i*0.18,0.5,'sawtooth',0.18)); break;
    }
  }
  // --- five procedural level scores; bosses accelerate and thicken each motif ---
  const MUSIC = [
    {step:0.17,bass:[110,0,0,0,82,0,0,0,87,0,0,0,98,0,82,0],
      lead:[330,0,440,392,330,0,294,0,262,294,330,0,294,262,220,0],bassWave:'triangle',leadWave:'square',drum:[0,4,8,12]},
    {step:0.19,bass:[82,0,82,0,73,0,0,0,78,0,73,0,65,0,0,0],
      lead:[247,0,233,0,196,0,220,0,185,196,0,0,165,0,185,0],bassWave:'sawtooth',leadWave:'triangle',drum:[0,6,10,14]},
    {step:0.145,bass:[98,0,98,0,116,0,98,0,87,0,87,0,98,0,73,0],
      lead:[294,0,349,330,294,0,262,294,233,0,294,262,220,233,196,0],bassWave:'square',leadWave:'triangle',drum:[0,2,4,6,8,10,12,14]},
    {step:0.22,bass:[73,0,0,0,69,0,0,0,82,0,0,0,65,0,0,0],
      lead:[220,0,0,233,0,196,0,0,185,0,208,0,165,0,0,0],bassWave:'sine',leadWave:'sine',drum:[0,8]},
    {step:0.13,bass:[82,0,82,98,82,0,73,0,65,0,73,82,62,0,73,0],
      lead:[330,294,262,0,349,330,294,0,247,262,294,330,220,247,262,0],bassWave:'sawtooth',leadWave:'square',drum:[0,2,4,6,8,10,12,14]}
  ];
  let musicKey='', musicProfile=MUSIC[0];
  function schedule(){
    if(!actx) return;
    while(stepClock < actx.currentTime + 0.2){
      const boss=!!bossActive, b=musicProfile.bass[nextStep], l=musicProfile.lead[nextStep];
      if(b) tone(b*(boss?1.059:1),stepClock,musicProfile.step*1.8,musicProfile.bassWave,boss?0.18:0.14,mGain);
      if(l) tone(l*(boss?1.122:1),stepClock,musicProfile.step*0.9,musicProfile.leadWave,boss?0.085:0.055,mGain);
      if(musicProfile.drum.includes(nextStep)){
        noise(stepClock,0.055,boss?0.12:0.07,'lowpass',boss?520:420,mGain);
        if(nextStep%4===0) tone(boss?72:62,stepClock,0.10,'sine',boss?0.12:0.075,mGain);
      }
      stepClock += musicProfile.step*(boss?0.84:1); nextStep=(nextStep+1)%16;
    }
  }
  function startMusic(){
    if(musicPlaying || !SETTINGS.soundOn || !SETTINGS.musicOn || !ensure()) return;
    unlock(); musicPlaying=true; musicProfile=MUSIC[levelIdx]||MUSIC[0]; musicKey=String(levelIdx);
    nextStep=0; stepClock=actx.currentTime+0.1;
    schedTimer=setInterval(schedule, 50);
  }
  function stopMusic(){ musicPlaying=false; if(schedTimer){ clearInterval(schedTimer); schedTimer=null; } }
  function music(on){
    if(!on){stopMusic();return;}
    const key=String(levelIdx);
    if(musicPlaying&&key!==musicKey){stopMusic();startMusic();}
    else startMusic();
  }
  return { play, unlock, music, get playing(){ return musicPlaying; } };
})();
function sfx(name){ AUDIO.play(name); }
// create/resume the audio context on the first real user gesture (browser policy)
addEventListener('pointerdown', ()=>AUDIO.unlock(), {once:false});
addEventListener('keydown', ()=>AUDIO.unlock(), {once:false});

// ================= MAIN LOOP =================
function tick(){
  gameT++;
  if (scene==='playing'){ update(); draw(); }
  else if (scene==='victory' || scene==='defeat'){ draw(); drawEndOverlay(); }
  else if (scene==='map'){ drawMap(); }
  else if (scene==='codex'){ drawCodex(); }
  else if (scene==='settings'){ drawSettings(); }
  else { drawTitle(); }
  // background music only plays during a level (and when enabled)
  AUDIO.music(scene==='playing' && SETTINGS.soundOn && SETTINGS.musicOn);
  mouse.click=false;
  requestAnimationFrame(tick);
}
tick();
</script>
